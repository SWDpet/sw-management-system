
#user  nobody;
worker_processes  auto;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # === 80: ACME 챌린지 + HTTPS 리다이렉트 ===
    # win-acme 인증서 발급 전 단계 — 80 블록만 올린다.
    server {
        listen       80;
        server_name  swbms.geonuris.net;

        # win-acme http-01 챌린지 (가장 긴 prefix 우선 → redirect보다 먼저 매칭)
        location /.well-known/acme-challenge/ { root D:/nginx-1.31.1/html; }

        # 나머지는 https로 (발급 후에도 유지)
        location / { return 301 https://$host$request_uri; }
    }

    # ============================================================
    # === 443: TLS 종단 → Tomcat   (★ win-acme 발급 후 주석 해제) ===
    # ============================================================
    server {
        listen 443 ssl;
        server_name swbms.geonuris.net;

        ssl_certificate     D:/nginx-1.31.1/ssl/swbms.geonuris.net-chain.pem;
        ssl_certificate_key D:/nginx-1.31.1/ssl/swbms.geonuris.net-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 50m;   # 기본 1MB -> 업로드 413 방지 (앱 한도에 맞춰 조정)
        # HSTS는 백엔드 앱(Spring Security)이 이미 'max-age=31536000; includeSubDomains' 로 내보냄
        # (RemoteIpValve로 앱이 https 인식 후 활성화). nginx에서 또 넣으면 중복(브라우저는 첫 헤더만 사용)이라 제거.
        # nginx를 단일 출처로 쓰려면 앱 측 HSTS를 끄고 아래 주석을 해제할 것.
        #add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            proxy_pass         http://127.0.0.1:8093;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   X-Forwarded-Port  443;
        }
    }

}
