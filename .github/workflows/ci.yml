name: CI

# beyond-A (ci-fresh-init-gate-v1): 로컬/수동 게이트를 push/PR 마다 자동 강제 +
# 빈 PostgreSQL 에 부트스트랩 DDL(phase1+phase2) fresh-init smoke.
# 기획/개발계획: docs/{product-specs,exec-plans}/beyond-a-ci-fresh-init-gate.md

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:                       # 중복 실행 취소(Actions 분 절약). master push 는 각 커밋 검증 보존 위해 미취소.
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gates:
    name: Build + 게이트 (jacoco/거대클래스/ArchUnit/Map부채/골든/Enum)
    runs-on: ubuntu-latest
    timeout-minutes: 30            # 런어웨이 빌드 방지(기본 6h 낭비 차단)
    env:
      # ${DB_PASSWORD} placeholder 해결용(컨텍스트 lazy 부팅 — 실 DB 연결은 안 함).
      # DB 통합테스트는 RUN_DB_TESTS 게이트(미설정)라 skip.
      DB_PASSWORD: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: mvnw 실행권한 부여 (git mode 100644)
        run: chmod +x ./mvnw
      - name: clean verify (전체 게이트)
        run: ./mvnw -B -ntp clean verify

  fresh-init-smoke:
    name: fresh-init smoke (빈 DB 부트스트랩 DDL replay)
    runs-on: ubuntu-latest
    timeout-minutes: 15            # 런어웨이 방지
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sw_dept_ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U ci -d sw_dept_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: psql client 보장
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: 부트스트랩 DDL fresh-init (phase1 -> sigungu -> phase2)
        env:
          PGPASSWORD: ci
        run: |
          set -e
          for f in db_init_phase1.sql db_init_phase1_sigungu.sql db_init_phase2.sql; do
            echo "::group::applying $f"
            psql -h localhost -U ci -d sw_dept_ci -v ON_ERROR_STOP=1 -f "src/main/resources/$f"
            echo "::endgroup::"
          done
      - name: 핵심 테이블 sanity (존재 확인)
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U ci -d sw_dept_ci -v ON_ERROR_STOP=1 \
            -c "SELECT count(*) FROM sigungu_code;" \
            -c "SELECT count(*) FROM users;" \
            -c "SELECT count(*) FROM sw_pjt;"
      # ⚠ 범위 = 부트스트랩 DDL(phase1+phase2) replay 멱등성. V*.sql 전체 replay(봉인된 결함)는 범위 밖.
