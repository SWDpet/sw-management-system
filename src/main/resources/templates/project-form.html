<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>SW 사업 관리 | 등록/수정</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --dark-navy: #1a237e;
            --bg-color: #f4f7f6;
            --card-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--bg-color); margin: 0; padding: 40px 20px; color: #444; }
        .admin-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: var(--card-shadow); overflow: hidden; }
        .page-header { background: var(--dark-navy); color: white; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        .header-btns { display: flex; gap: 10px; }
        .btn-top { background: rgba(255,255,255,0.15); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.85rem; transition: 0.3s; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; gap: 5px; }
        .btn-top:hover { background: white; color: var(--dark-navy); }
        form { padding: 30px; }
        fieldset { border: 1px solid #e3e6f0; border-radius: 8px; padding: 25px; margin-bottom: 30px; background: #fcfdff; }
        legend { font-weight: 700; color: var(--primary-color); padding: 0 10px; font-size: 1.1rem; }
        .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; min-width: 220px; display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #555; }
        input, select { padding: 12px; border: 1px solid #d1d3e2; border-radius: 6px; font-size: 0.95rem; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.2rem rgba(78,115,223,0.1); }
        input[readonly] { background-color: #eaecf4; color: #6e707e; font-weight: 600; cursor: not-allowed; }
        select:disabled { background-color: #eaecf4; color: #aaa; cursor: not-allowed; }
        .code-field { background-color: #f8faff !important; color: #d32f2f !important; font-weight: 700; }
        .page-footer { padding: 25px 30px; background: #f8f9fc; border-top: 1px solid #e3e6f0; display: flex; justify-content: center; gap: 20px; }
        .btn-save { background: #1cc88a; color: white; border: none; padding: 15px 60px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1.1rem; }
        .btn-cancel { background: var(--secondary-color); color: white; padding: 15px 60px; border-radius: 6px; font-weight: 700; text-decoration: none; font-size: 1.1rem; text-align: center; }
        .error-msg { color: #e74a3b; font-size: 0.9rem; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 40px; border-radius: 12px; width: 400px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .modal-icon { font-size: 3rem; color: #1cc88a; margin-bottom: 20px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: #333; margin-bottom: 10px; }
        .modal-desc { color: #666; margin-bottom: 30px; }
        .modal-btns { display: flex; justify-content: center; gap: 10px; }
        .btn-modal { padding: 12px 24px; border-radius: 6px; font-weight: 700; cursor: pointer; border: none; font-size: 1rem; color: white; transition: 0.2s; }
        .btn-list { background: #4e73df; }
        .btn-new { background: #1cc88a; }
        .btn-modal:hover { opacity: 0.9; transform: translateY(-2px); }
        .equip-table { width:100%; border-collapse:collapse; }
        .equip-table th, .equip-table td { padding:6px 8px; border:1px solid #e3e6f0; font-size:0.85em; text-align:center; }
        .equip-table th { background:#f8f9fc; color:#5a5c69; font-weight:600; }
        .equip-table input { width:100%; padding:5px; border:1px solid #d1d3e2; border-radius:4px; font-size:0.88em; box-sizing:border-box; }
        .equip-table .btn-del { padding:3px 8px; background:#e74a3b; color:white; border:none; border-radius:3px; font-size:0.75em; cursor:pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="page-header">
        <h2><i class="fas fa-file-invoice-dollar"></i> SW 사업 정보 등록/수정</h2>
        <div class="header-btns">
            <a th:href="@{/}" class="btn-top"><i class="fas fa-home"></i> 메인으로</a>
            <a href="/logout" class="btn-top" style="background:#e74a3b; color:white;"><i class="fas fa-sign-out-alt"></i> 로그아웃</a>
        </div>
    </div>

    <form id="projectForm" th:action="@{/projects/save}" th:object="${project}" method="post" onsubmit="saveProject(event)">
        <input type="hidden" id="projId" name="projId" th:value="*{projId}">

        <div th:if="${errorMessage}" class="error-msg">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <!-- ① 기본 및 담당자 정보 -->
        <fieldset>
            <legend><i class="fas fa-user-check"></i> 기본 및 담당자 정보</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>사업연도</label>
                    <input type="number" name="year" th:value="*{year}" id="yearInput" required>
                </div>
                <div class="form-group">
                    <label>PMS코드</label>
                    <input type="text" name="pmsCd" th:value="*{pmsCd}">
                </div>
                <div class="form-group">
                    <label>사업 담당자</label>
                    <!--
                        sw_pjt.person_id = users.user_id (userSeq)
                        표시: users.username  +  users.team_nm
                    -->
                    <select name="personId">
                        <option value="">-- 담당자 선택 --</option>
                        <option th:each="p : ${personList}"
                                th:value="${p.userSeq}"
                                th:text="${p.username + ' (' + p.teamNm + ')'}"
                                th:selected="${p.userSeq == project.personId}">
                        </option>
                    </select>
                </div>
            </div>
        </fieldset>

        <!-- ② 행정 및 기관 정보 -->
        <fieldset>
            <legend><i class="fas fa-university"></i> 행정 및 기관 정보</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>시도광역</label>
                    <!--
                        sigungu_code.sido_name 목록 → city_nm 저장
                        선택 시 loadDistricts() 로 시군구 목록 동적 로드
                    -->
                    <select id="citySelect" name="cityNm" onchange="loadDistricts()">
                        <option value="">-- 선택 --</option>
                        <option th:each="sido : ${sidoList}"
                                th:value="${sido}"
                                th:text="${sido}"
                                th:selected="${sido == project.cityNm}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>기관코드 (자동)</label>
                    <!--
                        sigungu_code.instt_c → 시군구 선택 시 자동 채워짐
                        수정 시에는 DB 기존값으로 초기 표시
                    -->
                    <input type="text" id="orgCd" name="orgCd" th:value="*{orgCd}" class="code-field" readonly>
                </div>
                <div class="form-group">
                    <label>기관명</label>
                    <input type="text" name="orgNm" th:value="*{orgNm}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>시군구</label>
                    <!--
                        시도 선택 후 loadDistricts() 로 목록 채워짐 → dist_nm 저장
                        수정 시: DOMContentLoaded에서 기존 cityNm으로 목록 로드 후 distNm 복원
                    -->
                    <select id="distSelect" name="distNm" onchange="autoFillCodes(this)">
                        <option value="">-- 시도를 먼저 선택하세요 --</option>
                        <!-- 수정 시 기존 distNm을 임시 option으로 표시 (JS로 교체됨) -->
                        <option th:if="${project.distNm}"
                                th:value="${project.distNm}"
                                th:text="${project.distNm}"
                                selected>
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>행정구역코드 (자동)</label>
                    <!--
                        sigungu_code.adm_sect_c → 시군구 선택 시 자동 채워짐
                        수정 시에는 DB 기존값으로 초기 표시
                    -->
                    <input type="text" id="distCd" name="distCd" th:value="*{distCd}" class="code-field" readonly>
                </div>
                <div class="form-group">
                    <label>기관장명</label>
                    <input type="text" name="orgLghNm" th:value="*{orgLghNm}">
                </div>
            </div>
        </fieldset>

        <!-- ③ 사업 식별 정보 -->
        <fieldset>
            <legend><i class="fas fa-project-diagram"></i> 사업 식별 정보</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>SW사업형태</label>
                    <!--
                        cont_frm_mst.nm 표시 / cont_frm_mst.cd 저장 (biz_type)
                    -->
                    <select name="bizType">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${contFrmList}"
                                th:value="${item.cd}"
                                th:text="${item.nm}"
                                th:selected="${item.cd == project.bizType}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>SW사업종류</label>
                    <!--
                        prj_types.nm 표시 / nm 저장 (biz_cat)
                        선택 시 prj_types.cd → biz_cat_en 자동 표출
                    -->
                    <select id="prjTypeSelect" name="bizCat" onchange="mapPrjType()">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${prjTypesList}"
                                th:value="${item.nm}"
                                th:text="${item.nm}"
                                th:data-cd="${item.cd}"
                                th:selected="${item.nm == project.bizCat}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>사업종류 영문명 (자동)</label>
                    <!-- prj_types.cd 값이 자동 입력됨 -->
                    <input type="text" id="bizCatEn" name="bizCatEn" th:value="*{bizCatEn}" class="code-field" readonly>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>시스템명</label>
                    <!--
                        sys_mst.nm 표시 / nm 저장 (sys_nm)
                        선택 시 sys_mst.cd → sys_nm_en 자동 표출
                    -->
                    <select id="sysMstSelect" name="sysNm" onchange="mapSysMst()">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${sysMstList}"
                                th:value="${item.nm}"
                                th:text="${item.nm}"
                                th:data-cd="${item.cd}"
                                th:selected="${item.nm == project.sysNm}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>시스템 영문명 (자동)</label>
                    <!-- sys_mst.cd 값이 자동 입력됨 -->
                    <input type="text" id="sysNmEn" name="sysNmEn" th:value="*{sysNmEn}" class="code-field" readonly>
                </div>
            </div>
        </fieldset>

        <!-- ④ 계약정보 -->
        <fieldset>
            <legend><i class="fas fa-file-contract"></i> 계약정보</legend>
            <div class="form-row">
                <div class="form-group" style="flex: 2;"><label>사업명</label><input type="text" name="projNm" th:value="*{projNm}" required></div>
                <div class="form-group"><label>발주처</label><input type="text" name="client" th:value="*{client}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>계약주체</label><input type="text" name="contEnt" th:value="*{contEnt}"></div>
                <div class="form-group"><label>계약부서</label><input type="text" name="contDept" th:value="*{contDept}"></div>
                <div class="form-group">
                    <label>계약구분</label>
                    <select name="contType">
                        <option value="직접" th:selected="${project.contType == '직접'}">직접</option>
                        <option value="하도"  th:selected="${project.contType == '하도'}">하도</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <!-- ⑤ 일정정보 -->
        <fieldset>
            <legend><i class="fas fa-calendar-alt"></i> 일정정보</legend>
            <div class="form-row">
                <div class="form-group"><label>계약일</label><input type="text" name="contDt"  th:value="${project.contDt != null ? #temporals.format(project.contDt, 'yyyy-MM-dd') : ''}"  maxlength="10" placeholder="YYYY-MM-DD" autocomplete="off" oninput="formatDate(this)" onchange="formatDate(this)"></div>
                <div class="form-group"><label>착수일</label><input type="text" name="startDt" th:value="${project.startDt != null ? #temporals.format(project.startDt, 'yyyy-MM-dd') : ''}" maxlength="10" placeholder="YYYY-MM-DD" autocomplete="off" oninput="formatDate(this)" onchange="formatDate(this)"></div>
                <div class="form-group"><label>준공일</label><input type="text" name="endDt"   th:value="${project.endDt != null ? #temporals.format(project.endDt, 'yyyy-MM-dd') : ''}"   maxlength="10" placeholder="YYYY-MM-DD" autocomplete="off" oninput="formatDate(this)" onchange="formatDate(this)"></div>
                <div class="form-group"><label>최초설치일</label><input type="text" name="instDt" th:value="${project.instDt != null ? #temporals.format(project.instDt, 'yyyy-MM-dd') : ''}" maxlength="10" placeholder="YYYY-MM-DD" autocomplete="off" oninput="formatDate(this)" onchange="formatDate(this)"></div>
            </div>
        </fieldset>

        <!-- ⑥ 제품 및 금액정보 -->
        <fieldset>
            <legend><i class="fas fa-coins"></i> 제품 및 금액정보</legend>
            <div class="form-row">
                <div class="form-group"><label>예산금액</label><input type="number" name="budgAmt" th:value="*{budgAmt}"></div>
                <div class="form-group"><label>계약금액</label><input type="number" name="contAmt" th:value="*{contAmt}"></div>
                <div class="form-group"><label>낙찰율(%)</label><input type="number" step="0.01" th:field="*{contRt}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>SW요율(%)</label><input type="number" step="0.01" th:field="*{swRt}"></div>
                <div class="form-group"><label>SW금액</label><input type="number" name="swAmt" th:value="*{swAmt}"></div>
                <div class="form-group"><label>컨설팅 금액</label><input type="number" name="cnsltAmt" th:value="*{cnsltAmt}"></div>
                <div class="form-group"><label>DB구축 금액</label><input type="number" name="dbImplAmt" th:value="*{dbImplAmt}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>패키지SW 금액</label><input type="number" name="pkgSwAmt" th:value="*{pkgSwAmt}"></div>
                <div class="form-group"><label>시스템개발 금액</label><input type="number" name="sysDevAmt" th:value="*{sysDevAmt}"></div>
                <div class="form-group"><label>HW 금액</label><input type="number" name="hwAmt" th:value="*{hwAmt}"></div>
                <div class="form-group"><label>기타 금액</label><input type="number" name="etcAmt" th:value="*{etcAmt}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>외주금액</label><input type="number" name="outscrAmt" th:value="*{outscrAmt}"></div>
                <div class="form-group">
                    <label>청구여부</label>
                    <select id="payProgYn" name="payProgYn" onchange="togglePayProgFr()">
                        <option value="Y" th:selected="${project.payProgYn == 'Y'}">Y</option>
                        <option value="N" th:selected="${project.payProgYn == 'N'}">N</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>청구형태</label>
                    <select id="payProgFr" name="payProgFr">
                        <option value="">-- 선택 --</option>
                        <option value="월"   th:selected="${project.payProgFr == '월'}">월</option>
                        <option value="격월" th:selected="${project.payProgFr == '격월'}">격월</option>
                        <option value="분기" th:selected="${project.payProgFr == '분기'}">분기</option>
                        <option value="반기" th:selected="${project.payProgFr == '반기'}">반기</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>기성계 대상</label>
                    <select name="interimYn">
                        <option value="Y" th:selected="${project.interimYn == 'Y'}">Y</option>
                        <option value="N" th:selected="${project.interimYn != 'Y'}">N</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>준공계 대상</label>
                    <select name="completionYn">
                        <option value="Y" th:selected="${project.completionYn == 'Y'}">Y</option>
                        <option value="N" th:selected="${project.completionYn != 'Y'}">N</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>유지보수 유형</label>
                    <select name="maintType">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${maintTpList}"
                                th:value="${item.cd}"
                                th:text="${item.nm}"
                                th:selected="${item.cd == project.maintType}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>계약 진행상태</label>
                    <select name="stat">
                        <option value="">-- 선택 --</option>
                        <option th:each="item : ${contStatList}"
                                th:value="${item.cd}"
                                th:text="${item.nm}"
                                th:selected="${item.cd == project.stat}">
                        </option>
                    </select>
                </div>
            </div>
        </fieldset>

        <!-- ⑦ 운영장비(HW/SW) 정보 -->
        <fieldset>
            <legend><i class="fas fa-server"></i> 운영장비(HW/SW) 도입 정보</legend>
            <p style="font-size:0.82em; color:#888; margin-bottom:15px;">설계내역서 출력 시 사용됩니다. 사업 저장 후 장비 정보를 입력/저장할 수 있습니다.</p>

            <div style="margin-bottom:12px; font-weight:700; color:#1cc88a;">◎ 하드웨어(HW)</div>
            <table class="equip-table" id="hwTable">
                <thead><tr><th>No</th><th>품명</th><th>규격</th><th>도입가(부가세포함)</th><th>수량</th><th>비고</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
            <button type="button" onclick="addEquipRow('hwTable','HW')" style="margin-top:5px; padding:5px 12px; background:#4e73df; color:white; border:none; border-radius:4px; font-size:0.8em; cursor:pointer;">+ HW 추가</button>

            <div style="margin:20px 0 12px; font-weight:700; color:#e74a3b;">◎ 소프트웨어(SW)</div>
            <table class="equip-table" id="swTable">
                <thead><tr><th>No</th><th>품명</th><th>규격</th><th>도입가(부가세포함)</th><th>수량</th><th>비고</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
            <button type="button" onclick="addEquipRow('swTable','SW')" style="margin-top:5px; padding:5px 12px; background:#4e73df; color:white; border:none; border-radius:4px; font-size:0.8em; cursor:pointer;">+ SW 추가</button>

            <div style="margin-top:15px; text-align:right;">
                <button type="button" onclick="saveEquipList()" style="padding:10px 24px; background:#1cc88a; color:white; border:none; border-radius:6px; font-weight:700; cursor:pointer; font-size:0.9em;"><i class="fas fa-save"></i> 장비 정보 저장</button>
            </div>
        </fieldset>

        <div class="page-footer">
            <button type="submit" class="btn-save">사업 정보 저장</button>
            <a th:href="@{/projects/status}" class="btn-cancel">취소</a>
        </div>
    </form>
</div>

<!-- 저장 완료 모달 -->
<div id="successModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
        <div class="modal-title">저장 완료!</div>
        <div class="modal-desc">사업 정보가 성공적으로 저장되었습니다.<br>다음 작업을 선택해주세요.</div>
        <div class="modal-btns">
            <button onclick="location.href='/projects/status'" class="btn-modal btn-list"><i class="fas fa-list"></i> 완료(목록)</button>
            <button onclick="location.href='/projects/new'"    class="btn-modal btn-new"><i class="fas fa-plus"></i> 계속 추가</button>
        </div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/

// ── 날짜 자동 포맷 (다양한 형식 → YYYY-MM-DD) ──────────────────────
function formatDate(input) {
    let raw = input.value.trim();

    // "26. 2. 13." / "26.02.13" 등 yy.MM.dd 형식 감지 → yyyy-MM-dd 변환
    let shortMatch = raw.match(/^(\d{2})\s*\.\s*(\d{1,2})\s*\.\s*(\d{1,2})\s*\.?\s*$/);
    if (shortMatch) {
        let y = '20' + shortMatch[1];
        let m = shortMatch[2].padStart(2, '0');
        let d = shortMatch[3].padStart(2, '0');
        input.value = y + '-' + m + '-' + d;
        return;
    }

    // "2026-02-13" 이미 정상 형식이면 유지
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return;

    // "2026.02.13" / "2026. 2. 13." 형식 → yyyy-MM-dd
    let fullMatch = raw.match(/^(\d{4})\s*\.\s*(\d{1,2})\s*\.\s*(\d{1,2})\s*\.?\s*$/);
    if (fullMatch) {
        let m = fullMatch[2].padStart(2, '0');
        let d = fullMatch[3].padStart(2, '0');
        input.value = fullMatch[1] + '-' + m + '-' + d;
        return;
    }

    // 숫자만 입력 시 자동 하이픈 삽입 (기존 로직)
    let v = raw.replace(/[^0-9]/g, '').substring(0, 8);
    if (v.length > 6)      v = v.substring(0,4) + '-' + v.substring(4,6) + '-' + v.substring(6);
    else if (v.length > 4) v = v.substring(0,4) + '-' + v.substring(4);
    input.value = v;
}

// ── 시도 선택 → 시군구 목록 동적 로드 ─────────────────────────────
async function loadDistricts() {
    const sido      = document.getElementById('citySelect').value;
    const distSel   = document.getElementById('distSelect');
    const distCdEl  = document.getElementById('distCd');
    const orgCdEl   = document.getElementById('orgCd');

    // 시도 비었으면 초기화
    if (!sido) {
        distSel.innerHTML = '<option value="">-- 시도를 먼저 선택하세요 --</option>';
        distCdEl.value = '';
        orgCdEl.value  = '';
        return;
    }

    distSel.innerHTML = '<option value="">-- 로딩 중... --</option>';

    try {
        const res  = await fetch('/projects/api/districts?sido=' + encodeURIComponent(sido));
        const data = await res.json();

        distSel.innerHTML = '<option value="">-- 선택 --</option>';
        data.forEach(item => {
            const opt = document.createElement('option');
            opt.value          = item.sggNm;
            opt.innerText      = item.sggNm;
            opt.dataset.dist   = (item.admSectC || '').trim(); // 행정구역코드
            opt.dataset.inst   = (item.insttC   || '').trim(); // 기관코드
            distSel.appendChild(opt);
        });
    } catch (e) {
        console.error('[loadDistricts]', e);
        distSel.innerHTML = '<option value="">-- 로드 실패 --</option>';
    }
}

// ── 시군구 선택 → 기관코드·행정구역코드 자동 채움 ────────────────
function autoFillCodes(selectEl) {
    const opt = selectEl.options[selectEl.selectedIndex];
    document.getElementById('distCd').value = (opt && opt.dataset.dist) ? opt.dataset.dist : '';
    document.getElementById('orgCd').value  = (opt && opt.dataset.inst) ? opt.dataset.inst : '';
}

// ── SW사업종류 선택 → 영문명(prj_types.cd) 자동 표출 ─────────────
function mapPrjType() {
    const sel = document.getElementById('prjTypeSelect');
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('bizCatEn').value = (opt && opt.dataset.cd) ? opt.dataset.cd : '';
}

// ── 시스템명 선택 → 영문명(sys_mst.cd) 자동 표출 ────────────────
function mapSysMst() {
    const sel = document.getElementById('sysMstSelect');
    const opt = sel.options[sel.selectedIndex];
    document.getElementById('sysNmEn').value = (opt && opt.dataset.cd) ? opt.dataset.cd : '';
}

// ── 청구여부 Y/N → 청구형태 활성/비활성 ─────────────────────────
function togglePayProgFr() {
    const yn = document.getElementById('payProgYn');
    const fr = document.getElementById('payProgFr');
    if (!yn || !fr) return;
    if (yn.value === 'N') { fr.value = ''; fr.disabled = true; }
    else                  { fr.disabled = false; }
}

// ── 저장 (AJAX POST) ───────────────────────────────────────────────
async function saveProject(event) {
    event.preventDefault();
    const form = document.getElementById('projectForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const projIdEl = document.getElementById('projId');
    if (projIdEl && projIdEl.value) {
        if (!confirm('기존 데이터를 수정하시겠습니까?\n([취소]를 누르면 새 데이터로 등록됩니다.)')) {
            projIdEl.value = '';
        }
    }

    try {
        const res = await fetch(form.action, { method: 'POST', body: new FormData(form) });
        if (res.ok) {
            const htmlText = await res.text();
            const errorEl  = new DOMParser().parseFromString(htmlText, 'text/html').querySelector('.error-msg');
            if (errorEl) alert('⚠️ 저장 실패\n\n' + errorEl.innerText.trim());
            else document.getElementById('successModal').style.display = 'flex';
        } else {
            alert('저장 중 오류가 발생했습니다. (Status: ' + res.status + ')');
        }
    } catch (e) {
        console.error(e);
        alert('서버 통신 중 오류가 발생했습니다.');
    }
}

// ── 키보드 단축키 ─────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON' && e.target.type !== 'submit') {
            e.preventDefault();
            const els = Array.from(e.target.form?.querySelectorAll("input:not([type='hidden']), select") || []);
            const idx = els.indexOf(e.target);
            if (idx > -1 && idx < els.length - 1) els[idx + 1].focus();
        }
    }
    if (e.key === 'Insert') {
        e.preventDefault();
        document.getElementById('yearInput')?.focus();
    }
    if (e.key === 'End') {
        e.preventDefault();
        document.querySelector('.btn-save')?.click();
    }
});

// ── 장비(HW/SW) 관리 ─────────────────────────────────────────────
function addEquipRow(tableId, type, data) {
    var tbody = document.getElementById(tableId).querySelector('tbody');
    var rowCount = tbody.rows.length + 1;
    var tr = document.createElement('tr');
    tr.dataset.type = type;
    tr.innerHTML =
        '<td>' + rowCount + '</td>' +
        '<td><input type="text" class="eq-name" value="' + (data ? data.equipName : '') + '" placeholder="예: DB서버"></td>' +
        '<td><input type="text" class="eq-spec" value="' + (data ? data.spec : '') + '" placeholder="규격"></td>' +
        '<td><input type="number" class="eq-price" value="' + (data ? data.unitPrice : '') + '" placeholder="도입가"></td>' +
        '<td><input type="number" class="eq-qty" value="' + (data ? data.quantity : 1) + '" style="width:50px;text-align:center;"></td>' +
        '<td><input type="text" class="eq-remark" value="' + (data ? data.remark : '') + '" placeholder="비고"></td>' +
        '<td><button type="button" class="btn-del" onclick="this.closest(\'tr\').remove();renumberEquip(\'' + tableId + '\')">삭제</button></td>';
    tbody.appendChild(tr);
}

function renumberEquip(tableId) {
    var rows = document.getElementById(tableId).querySelector('tbody').rows;
    for (var i = 0; i < rows.length; i++) {
        rows[i].cells[0].textContent = i + 1;
    }
}

function collectEquipData() {
    var items = [];
    ['hwTable', 'swTable'].forEach(function(tableId) {
        var type = tableId === 'hwTable' ? 'HW' : 'SW';
        var rows = document.getElementById(tableId).querySelector('tbody').rows;
        for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            var name = r.querySelector('.eq-name').value.trim();
            if (!name) continue;
            items.push({
                equipType: type,
                equipName: name,
                spec: r.querySelector('.eq-spec').value.trim(),
                unitPrice: parseInt(r.querySelector('.eq-price').value) || 0,
                quantity: parseInt(r.querySelector('.eq-qty').value) || 1,
                remark: r.querySelector('.eq-remark').value.trim()
            });
        }
    });
    return items;
}

function saveEquipList() {
    var projId = document.getElementById('projId').value;
    if (!projId) { alert('사업 정보를 먼저 저장해주세요.'); return; }
    var items = collectEquipData();
    var csrfToken = document.querySelector('meta[name="_csrf"]').content;
    var csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    var headers = { 'Content-Type': 'application/json' };
    headers[csrfHeader] = csrfToken;
    fetch('/projects/api/equip/' + projId, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(items)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) alert('장비 정보가 저장되었습니다. (' + data.count + '건)');
        else alert('저장 실패: ' + (data.error || ''));
    })
    .catch(function(e) { alert('통신 오류'); console.error(e); });
}

function loadEquipList(projId) {
    if (!projId) return;
    fetch('/projects/api/equip/' + projId)
    .then(function(r) { return r.json(); })
    .then(function(list) {
        list.forEach(function(item) {
            var tableId = item.equipType === 'HW' ? 'hwTable' : 'swTable';
            addEquipRow(tableId, item.equipType, item);
        });
    })
    .catch(function(e) { console.error('장비 로드 실패', e); });
}

// ── 페이지 초기화 ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {

    togglePayProgFr();

    // Thymeleaf 서버에서 주입한 기존 저장 값
    const savedCityNm = /*[[${project.cityNm}]]*/ '';
    const savedDistNm = /*[[${project.distNm}]]*/ '';
    const savedDistCd = /*[[${project.distCd}]]*/ '';
    const savedOrgCd  = /*[[${project.orgCd}]]*/  '';

    // 수정 모드: cityNm이 있으면 시군구 목록을 서버에서 로드한 뒤 기존 값 복원
    if (savedCityNm && savedCityNm !== 'null') {
        await loadDistricts();  // API 호출로 시군구 option 목록 채움

        // distNm 선택 복원
        if (savedDistNm && savedDistNm !== 'null') {
            document.getElementById('distSelect').value = savedDistNm;
        }
        // distCd / orgCd 복원 (loadDistricts가 초기화했으므로 재세팅)
        if (savedDistCd && savedDistCd !== 'null') {
            document.getElementById('distCd').value = savedDistCd;
        }
        if (savedOrgCd && savedOrgCd !== 'null') {
            document.getElementById('orgCd').value = savedOrgCd;
        }
    }

    // 시스템명 select 알파벳 정렬 후 기존 값 재선택
    const sysSel = document.getElementById('sysMstSelect');
    if (sysSel && sysSel.options.length > 1) {
        const def  = sysSel.options[0];
        const opts = Array.from(sysSel.options).slice(1).sort((a,b) => a.text.localeCompare(b.text, 'ko'));
        sysSel.innerHTML = '';
        sysSel.appendChild(def);
        opts.forEach(o => sysSel.appendChild(o));
        const curSysNm = /*[[${project.sysNm}]]*/ '';
        if (curSysNm && curSysNm !== 'null') sysSel.value = curSysNm;
    }

    // 수정 모드: 장비 목록 로드
    var projId = document.getElementById('projId').value;
    if (projId) loadEquipList(projId);
});
/*]]>*/
</script>
