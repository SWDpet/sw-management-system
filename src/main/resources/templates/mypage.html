<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #FAFAF9; padding: 24px; margin: 0; }
        .card { max-width: 1200px; margin: auto; background: white; padding: 28px 32px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); }
        h2 { color: #134E4A; border-bottom: 2px solid #134E4A; padding-bottom: 12px; margin: 0 0 20px; font-weight: 700; font-size: 1.4em; }
        h3 { font-size: 1em; color: #0F766E; margin: 0 0 14px; border-left: 4px solid #0F766E; padding-left: 10px; }

        /* 2x2 메인 레이아웃 */
        .main-grid { display: grid; grid-template-columns: 1.55fr 1fr; gap: 22px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }

        .section { background: #fafbff; border: 1px solid #e8eaf6; border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
        .section:last-child { margin-bottom: 0; }

        /* 내부 폼 그리드 — 2~3열 */
        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 14px; }
        @media (max-width: 820px) { .form-grid-3 { grid-template-columns: 1fr 1fr; } }
        .span2 { grid-column: span 2; }
        .span3 { grid-column: 1 / -1; }

        .form-group { margin: 0; }
        label { display: block; font-weight: 600; margin-bottom: 4px; color: #555; font-size: 0.78em; }
        input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 5px; box-sizing: border-box; background: #fff; font-size: 0.88em; }
        input[readonly] { background: #f3f4f6; color: #888; cursor: not-allowed; border-color: #eee; }
        select { width: 100%; padding: 8px 10px; border: 1px solid #0F766E; border-radius: 5px; font-size: 0.85em; background: #fff; }
        .btn-submit { padding: 11px 22px; background: #134E4A; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.92em; }
        .btn-submit:hover { background: #10154c; }
        .btn-pw-change { padding: 10px 18px; background: #0F766E; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.88em; width: 100%; }
        .btn-pw-change:hover { background: #115E59; }
        .info-box { background: #e3f2fd; border: 1px solid #90caf9; color: #1565c0; padding: 10px 12px; border-radius: 6px; font-size: 0.8em; text-align: center; margin-top: 10px; }
        .warning-box { background: #fff3e0; border: 1px solid #ffe0b2; color: #e65100; padding: 10px 12px; border-radius: 6px; font-size: 0.8em; text-align: center; margin-top: 10px; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 14px; font-weight: bold; text-align: center; font-size: 0.88em; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        .action-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 8px; }
        .footer-link { text-align: center; margin-top: 18px; }
        .footer-link a { color: #666; text-decoration: none; font-size: 0.88em; }
        .footer-link a:hover { color: #0F766E; }
    
        /* 테이블 현대화 — 행 높이 + hover 좌측 teal 바 */
        tbody tr { transition: background 0.12s, box-shadow 0.12s; }
        tbody tr:hover { background-color: #FAFAF9 !important; box-shadow: inset 3px 0 0 0 #0F766E; }
        thead th { font-size: 0.76em !important; letter-spacing: 0.05em; text-transform: uppercase; padding: 14px 12px !important; }
        tbody td { padding: 14px 12px !important; }

        /* 폼 — teal focus ring */
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #0F766E !important;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12) !important;
        }

    </style>
</head>
<body>
<!-- 공통 GNB -->
<div th:replace="~{fragments/top-nav :: nav}"></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #E7E5E4; padding-bottom:16px; margin-bottom:22px;">
        <h2 style="margin:0; border:none; padding:0; font-size:1.35rem; font-weight:700; color:#1C1917;">👤 마이페이지</h2>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <form th:action="@{/mypage/update}" method="post" onsubmit="return confirmUpdate();">
        <div class="main-grid">
            <!-- 좌측: 기본정보 + 인적사항 -->
            <div>
                <div class="section">
                    <h3>1. 기본 정보 <span style="font-size:0.8em; color:#888; font-weight:400;">(수정 불가)</span></h3>
                    <div class="form-grid-3">
                        <div class="form-group">
                            <label>아이디</label>
                            <input type="text" th:value="${user.userid}" readonly>
                        </div>
                        <div class="form-group">
                            <label>성명</label>
                            <input type="text" th:value="${user.username}" readonly>
                        </div>
                        <div class="form-group">
                            <label>소속</label>
                            <input type="text" th:value="${user.orgNm}" readonly>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h3>2. 인적 사항 <span style="font-size:0.8em; color:#888; font-weight:400;">(수정 가능)</span></h3>
                    <div class="form-grid-3">
                        <div class="form-group">
                            <label>부서명</label>
                            <input type="text" name="deptNm" th:value="${user.deptNm}" required>
                        </div>
                        <div class="form-group">
                            <label>팀명</label>
                            <input type="text" name="teamNm" th:value="${user.teamNm}" required>
                        </div>
                        <div class="form-group">
                            <label>직급</label>
                            <input type="text" name="positionTitle" th:value="${user.positionTitle}">
                        </div>
                        <div class="form-group">
                            <label>연락처 (일반전화)</label>
                            <input type="text" name="tel" th:value="${user.tel}" required>
                        </div>
                        <div class="form-group">
                            <label>휴대전화</label>
                            <input type="text" name="mobile" th:value="${user.mobile}">
                        </div>
                        <div class="form-group">
                            <label>이메일</label>
                            <input type="email" name="email" th:value="${user.email}" required>
                        </div>
                        <div class="form-group">
                            <label>주민번호</label>
                            <input type="text" name="ssn" th:value="${user.ssn}" maxlength="14" placeholder="770914-1234567">
                        </div>
                        <div class="form-group">
                            <label>기술등급</label>
                            <input type="text" name="techGrade" th:value="${user.techGrade}" placeholder="초급/중급/고급/특급">
                        </div>
                        <div class="form-group">
                            <label>주소</label>
                            <input type="text" name="address" th:value="${user.address}">
                        </div>
                        <div class="form-group span3">
                            <label>자격증 <span style="color:#888; font-weight:400;">(콤마 구분)</span></label>
                            <input type="text" name="certificate" th:value="${user.certificate}" placeholder="예: 정보처리기사, 측량기능사">
                        </div>
                        <div class="form-group span3">
                            <label>업무 <span style="color:#888; font-weight:400;">(Enter 로 추가)</span></label>
                            <div id="tasksChipBox" style="border:1px solid #d1d5db; border-radius:5px; padding:6px; min-height:36px; display:flex; flex-wrap:wrap; gap:5px; align-items:center; cursor:text; background:#fff;"
                                 onclick="document.getElementById('tasksChipInput').focus();">
                                <input type="text" id="tasksChipInput" placeholder="업무 입력 후 Enter" style="border:none; outline:none; flex:1; min-width:160px; padding:4px; font-size:0.88em;">
                            </div>
                            <input type="hidden" name="tasks" id="tasksHidden" th:value="${user.tasks}">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 우측: 권한 재요청 (비밀번호 변경은 별도 form 이라 main-grid 밖으로) -->
            <div>
                <div class="section">
                    <h3>3. 권한 재요청</h3>
                    <div class="form-grid-2">
                        <div class="form-group"><label>대시보드</label>
                            <select name="authDashboard">
                                <option value="NONE" th:selected="${user.authDashboard == 'NONE'}">❌ 권한없음</option>
                                <option value="VIEW" th:selected="${user.authDashboard == 'VIEW'}">👁️ 조회</option>
                                <option value="EDIT" th:selected="${user.authDashboard == 'EDIT'}">✏️ 편집</option>
                            </select>
                        </div>
                        <div class="form-group"><label>사업관리</label>
                            <select name="authProject">
                                <option value="NONE" th:selected="${user.authProject == 'NONE'}">❌ 권한없음</option>
                                <option value="VIEW" th:selected="${user.authProject == 'VIEW'}">👁️ 조회</option>
                                <option value="EDIT" th:selected="${user.authProject == 'EDIT'}">✏️ 편집</option>
                            </select>
                        </div>
                        <div class="form-group"><label>담당자관리</label>
                            <select name="authPerson">
                                <option value="NONE" th:selected="${user.authPerson == 'NONE'}">❌ 권한없음</option>
                                <option value="VIEW" th:selected="${user.authPerson == 'VIEW'}">👁️ 조회</option>
                                <option value="EDIT" th:selected="${user.authPerson == 'EDIT'}">✏️ 편집</option>
                            </select>
                        </div>
                        <div class="form-group"><label>서버관리</label>
                            <select name="authInfra">
                                <option value="NONE" th:selected="${user.authInfra == 'NONE'}">❌ 권한없음</option>
                                <option value="VIEW" th:selected="${user.authInfra == 'VIEW'}">👁️ 조회</option>
                                <option value="EDIT" th:selected="${user.authInfra == 'EDIT'}">✏️ 편집</option>
                            </select>
                        </div>
                        <div class="form-group"><label>라이선스</label>
                            <select name="authLicense">
                                <option value="NONE" th:selected="${user.authLicense == null or user.authLicense == 'NONE'}">❌ 권한없음</option>
                                <option value="VIEW" th:selected="${user.authLicense == 'VIEW'}">👁️ 조회</option>
                                <option value="EDIT" th:selected="${user.authLicense == 'EDIT'}">✏️ 편집</option>
                            </select>
                        </div>
                        <div class="form-group"><label>견적서</label>
                            <select name="authQuotation">
                                <option value="NONE" th:selected="${user.authQuotation == null or user.authQuotation == 'NONE'}">❌ 권한없음</option>
                                <option value="VIEW" th:selected="${user.authQuotation == 'VIEW'}">👁️ 조회</option>
                                <option value="EDIT" th:selected="${user.authQuotation == 'EDIT'}">✏️ 편집</option>
                            </select>
                        </div>
                    </div>
                    <th:block sec:authorize="hasRole('ROLE_ADMIN')">
                        <div class="info-box">※ 관리자 권한이므로 즉시 수정됩니다.</div>
                    </th:block>
                    <th:block sec:authorize="!hasRole('ROLE_ADMIN')">
                        <div class="warning-box">※ 수정 시 재승인이 필요하여 로그아웃됩니다.</div>
                    </th:block>
                </div>
            </div>
        </div>

        <div class="action-row" style="justify-content:flex-end;">
            <button type="submit" class="btn-submit" sec:authorize="hasRole('ROLE_ADMIN')">정보 수정 (즉시 반영)</button>
            <button type="submit" class="btn-submit" sec:authorize="!hasRole('ROLE_ADMIN')">수정 요청 및 로그아웃</button>
        </div>
    </form>

    <!-- 비밀번호 변경 (별도 form) -->
    <form th:action="@{/mypage/password}" method="post" onsubmit="return validatePassword();" style="margin-top: 18px;">
        <div class="section" style="background:#f3f4f6;">
            <h3 style="color:#7B1FA2; border-left-color:#7B1FA2;">4. 비밀번호 변경</h3>
            <div class="form-grid-3">
                <div class="form-group">
                    <label>현재 비밀번호</label>
                    <input type="password" name="currentPw" required placeholder="현재 사용 중인 비밀번호">
                </div>
                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" id="newPw" name="newPw" required placeholder="최소 4자 이상">
                </div>
                <div class="form-group">
                    <label>새 비밀번호 확인</label>
                    <input type="password" id="confirmPw" name="confirmPw" required placeholder="다시 입력">
                </div>
            </div>
            <div class="action-row" style="justify-content:flex-end; margin-top:12px;">
                <button type="submit" class="btn-pw-change" style="width:auto; padding:10px 22px;">비밀번호 변경하기</button>
            </div>
        </div>
    </form>

</div>

<!-- 업무 chip 입력 로직 (기존 유지) -->
<script th:inline="none">
(function(){
    var box   = document.getElementById('tasksChipBox');
    var input = document.getElementById('tasksChipInput');
    var hidden= document.getElementById('tasksHidden');
    if (!box || !input || !hidden) return;
    function render(arr){
        Array.from(box.querySelectorAll('.chip')).forEach(function(c){c.remove();});
        arr.forEach(function(t){
            var chip = document.createElement('span');
            chip.className = 'chip';
            chip.style.cssText = 'background:#e3f2fd; color:#1565c0; padding:3px 8px; border-radius:12px; font-size:0.82em; display:inline-flex; align-items:center; gap:4px;';
            chip.innerHTML = t + ' <span style="cursor:pointer; font-weight:bold;" onclick="event.stopPropagation(); this.parentNode.dataset.del=\'1\'; window.__taskRefresh();">×</span>';
            chip.dataset.val = t;
            box.insertBefore(chip, input);
        });
    }
    window.__taskRefresh = function(){
        var arr = [];
        Array.from(box.querySelectorAll('.chip')).forEach(function(c){
            if (c.dataset.del === '1') { c.remove(); return; }
            arr.push(c.dataset.val);
        });
        hidden.value = arr.join(',');
    };
    input.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            var v = input.value.trim().replace(/,$/,'');
            if (!v) return;
            var arr = hidden.value ? hidden.value.split(',') : [];
            if (arr.indexOf(v) === -1) arr.push(v);
            hidden.value = arr.join(',');
            render(arr);
            input.value = '';
        } else if (e.key === 'Backspace' && !input.value) {
            var arr = hidden.value ? hidden.value.split(',') : [];
            arr.pop();
            hidden.value = arr.join(',');
            render(arr);
        }
    });
    var init = hidden.value ? hidden.value.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
    hidden.value = init.join(',');
    render(init);
})();
</script>

<script th:inline="javascript">
    function confirmUpdate() {
        var isAdmin = /*[[${#authorization.expression('hasRole(''ROLE_ADMIN'')')}]]*/ false;
        if (isAdmin) return confirm("관리자 권한으로 정보를 즉시 수정하시겠습니까?");
        else return confirm("수정 시 재승인이 필요하며 자동 로그아웃됩니다.\n진행하시겠습니까?");
    }

    function validatePassword() {
        const newPw = document.getElementById('newPw').value;
        const confirmPw = document.getElementById('confirmPw').value;

        if (newPw.length < 4) {
            alert("비밀번호는 최소 4자 이상이어야 합니다.");
            return false;
        }
        if (newPw !== confirmPw) {
            alert("새 비밀번호와 확인 비밀번호가 일치하지 않습니다.");
            return false;
        }
        return confirm("정말로 비밀번호를 변경하시겠습니까?");
    }
</script>
</body>
</html>
