<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>고객 정보</title>
</head>
<body>
    <h1>고객 정보 리스트</h1>
    <a href="/customers/new">[신규 고객 등록]</a> | <a href="/projects">[사업 현황 보기]</a>
    <hr>
    <table border="1">
        <thead>
            <tr>
                <th>기관명</th> <th>담당자</th> <th>이메일</th> <th>연락처</th> </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${customers}">
                <td th:text="${c.orgNm}"></td>
                <td th:text="${c.userNm}"></td>
                <td th:text="${c.email}"></td>
                <td th:text="${c.tel}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
