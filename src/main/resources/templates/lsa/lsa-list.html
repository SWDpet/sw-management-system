<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LSA 라이선스 발급 대장 - SW Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" href="/css/design-system.css">
    <style>
        body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); margin:0; color:var(--text); font-size:13.5px; }
        .container { max-width:1700px; margin:auto; padding:28px 32px 56px; }
        .page-title { display:flex; align-items:center; gap:12px; margin-bottom:22px; }
        .page-title h2 { margin:0; font-size:1.45rem; font-weight:700; }
        .toolbar { background:var(--surface); padding:12px 20px; border-radius:12px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 6px rgba(0,0,0,0.06); border:1px solid var(--border); }
        .empty-hint { background:var(--surface); border:1px dashed var(--border2); border-radius:12px; padding:48px; text-align:center; color:var(--muted); }
    </style>
</head>
<body>
<!-- GNB (메인 대시보드와 동일) -->
<div th:replace="~{fragments/top-nav :: nav}"></div>

<div class="container">
    <div class="page-title">
        <i class="fas fa-certificate" style="color:var(--primary);font-size:1.4rem;"></i>
        <h2>LSA 라이선스 발급 대장</h2>
    </div>

    <div class="toolbar">
        <div class="filter-group">
            <input type="search" placeholder="지자체·이름·버전·발급자 검색" disabled
                   style="padding:7px 13px;border-radius:8px;border:1.5px solid var(--border2);background:var(--bg);min-width:280px;">
        </div>
        <a class="btn btn-primary" href="#" aria-disabled="true"><i class="fas fa-plus"></i> 작성</a>
    </div>

    <div class="empty-hint">
        <i class="fas fa-tools" style="font-size:2rem;opacity:0.5;"></i>
        <p>LSA 발급 대장 목록·검색·작성은 다음 단계(P2/P3)에서 제공됩니다.</p>
    </div>
</div>
</body>
</html>
