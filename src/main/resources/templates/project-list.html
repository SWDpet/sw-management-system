<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW 사업 현황 | 관리자 모드</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0F766E;
            --secondary-color: #858796;
            --dark-navy: #134E4A;
            --bg-color: #f4f7f6;
            --card-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #FAFAF9;
            margin: 0; padding: 0; color: #1C1917;
        }

        .admin-container {
            max-width: 1700px; margin: 0 auto;
            padding: 28px 32px 56px;
        }

        /* 라이트 페이지 헤더 (GNB 하단) */
        .page-header {
            padding: 0 0 22px; margin-bottom: 22px;
            border-bottom: 1px solid #E7E5E4;
            display: flex; justify-content: space-between; align-items: center;
        }
        .page-header h2 {
            margin: 0; font-size: 1.35rem; font-weight: 700; color: #1C1917;
            display: flex; align-items: center; gap: 10px;
        }
        .page-header h2 i { color: #0F766E; font-size: 1.1rem; }

        .header-btns { display: flex; gap: 8px; }
        .btn-top {
            background: transparent; color: #57534E;
            padding: 7px 14px; border-radius: 8px; text-decoration: none;
            font-size: 0.83rem; font-weight: 600; transition: all 0.15s;
            border: 1px solid #E7E5E4;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-top:hover { background: #F5F5F4; border-color: #D6D3D1; color: #1C1917; }
        .btn-top.btn-primary { background: #0F766E; color: #fff; border-color: #0F766E; }
        .btn-top.btn-primary:hover { background: #115E59; border-color: #115E59; color: #fff; }

        /* 검색 바 스타일 */
        .search-row {
            padding: 20px 30px; background: #f8f9fc; border-bottom: 1px solid #e3e6f0;
            display: flex; justify-content: flex-end;
            align-items: flex-start; flex-direction: column; gap: 8px;
        }
        .search-form { display: flex; gap: 10px; width: 100%; justify-content: flex-end; }
        .search-input {
            padding: 8px 12px; border: 1px solid #d1d3e2; border-radius: 6px; width: 480px; font-size: 0.95rem; outline: none;
        }
        .search-input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(15, 118, 110,0.15); }
        .btn-search {
            background: var(--primary-color); color: white; border: none; padding: 8px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 5px;
            white-space: nowrap;
        }
        .btn-search:hover { opacity: 0.9; }
        /* 신규 검색 (v2) */
        .search-form-v2 { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .search-form-v2 .search-input { width: 100%; }
        .filter-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-cell { display: inline-flex; align-items: center; gap: 4px; }
        .filter-cell select {
            padding: 7px 12px; border-radius: 8px;
            border: 1.5px solid #E7E5E4; font-size: 0.85rem;
            background: #fff; color: #1C1917;
            font-family: inherit; transition: border-color 0.15s, background 0.15s;
            min-width: 140px;
        }
        .filter-cell select:focus { outline: none; border-color: #0F766E; box-shadow: 0 0 0 3px rgba(15,118,110,0.12); }
        .filter-cell select:disabled { background: #F5F5F4; color: #A8A29E; cursor: not-allowed; }
        .filter-cell.pinned select { background: #F0FDFA; border-color: #99F6E4; }
        .pin-btn {
            background: transparent; border: 1px solid #E7E5E4; color: #A8A29E;
            width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.72rem; padding: 0; transition: all 0.15s;
        }
        .pin-btn:hover { background: #F5F5F4; color: #57534E; }
        .pin-btn.active { background: #F0FDFA; color: #0F766E; border-color: #99F6E4; }
        .search-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-reset {
            background: transparent; color: #57534E; border: 1px solid #E7E5E4;
            padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
            font-family: inherit; transition: all 0.15s;
        }
        .btn-reset:hover { background: #F5F5F4; color: #1C1917; border-color: #D6D3D1; }
        .btn-reset:active, .btn-search:active, .pin-btn:active { transform: scale(0.97); }

        /* 테이블 영역 */
        .table-area { padding: 30px; }
        .table-responsive { overflow-x: auto; border: 1px solid #e3e6f0; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #f8f9fc; padding: 15px; text-align: center; 
            border-bottom: 2px solid #e3e6f0; color: var(--dark-navy); 
            font-size: 0.85rem; font-weight: 700;
            white-space: nowrap; 
        }
        td { 
            padding: 12px 15px; border-bottom: 1px solid #e3e6f0; 
            text-align: center; font-size: 0.9rem; color: #5a5c69;
            white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis;
        }
        tr:hover { background-color: #f8f9ff; }

        .proj-nm-cell { text-align: left !important; max-width: 400px; }
        .amt { text-align: right; padding-right: 20px; font-weight: 600; color: #134E4A; }
        .status-1 { color: #0F766E; font-weight: 800; background: #eaecf4; padding: 4px 8px; border-radius: 4px; }
        .status-2 { color: #1cc88a; font-weight: 800; background: #e2f9f1; padding: 4px 8px; border-radius: 4px; }
        
        .proj-link { color: var(--primary-color); text-decoration: none; font-weight: 700; }
        .proj-link:hover { text-decoration: underline; }

        /* 페이징 스타일 */
        .pagination-container {
            display: flex; justify-content: center;
            padding: 25px 0; background: #f8f9fc; border-top: 1px solid #e3e6f0;
        }
        .pagination { display: flex; list-style: none; padding: 0; gap: 5px; }
        .page-item a {
            display: block; padding: 8px 16px; border-radius: 6px;
            text-decoration: none; color: var(--primary-color);
            background: white; border: 1px solid #d1d3e2;
            font-weight: 600; transition: 0.3s;
        }
        .page-item.active a { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .page-item a:hover:not(.active) { background: #eaecf4; }
    
        /* 테이블 현대화 — 행 높이 + hover 좌측 teal 바 */
        tbody tr { transition: background 0.12s, box-shadow 0.12s; }
        tbody tr:hover { background-color: #FAFAF9 !important; box-shadow: inset 3px 0 0 0 #0F766E; }
        thead th { font-size: 0.76em !important; letter-spacing: 0.05em; text-transform: uppercase; padding: 14px 12px !important; }
        tbody td { padding: 14px 12px !important; }

        /* 폼 — teal focus ring */
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #0F766E !important;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12) !important;
        }

    </style>
</head>
<body>

    <!-- 공통 GNB -->
    <div th:replace="~{fragments/top-nav :: nav}"></div>

    <div class="admin-container">
        <div class="page-header">
            <h2><i class="fas fa-list-ul"></i> SW 사업 추진 현황</h2>
            <div class="header-btns">
                <th:block th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')
                                or (#authentication.principal instanceof T(com.swmanager.system.config.CustomUserDetails)
                                    and #authentication.principal.user?.authProject == 'EDIT')}">
                    <a th:href="@{/projects/new}" class="btn-top btn-primary">
                        <i class="fas fa-plus"></i> 신규 사업 등록
                    </a>
                </th:block>
            </div>
        </div>

        <div class="search-row">
            <form th:action="@{/projects/status}" method="get" id="searchForm" class="search-form-v2">
                <input type="text" name="kw" id="kwInput" th:value="${kw}"
                       class="search-input" placeholder="사업명·발주처·PMS코드 검색" autocomplete="off">
                <div class="filter-grid">
                    <div class="filter-cell" data-field="year">
                        <button type="button" class="pin-btn" data-target="year" title="조건 고정">📌</button>
                        <select name="year">
                            <option value="">전체 연도</option>
                            <option th:each="y : ${yearOptions}"
                                    th:value="${y}"
                                    th:text="${y + '년'}"
                                    th:selected="${year != null and year == y.toString()}"></option>
                        </select>
                    </div>
                    <div class="filter-cell" data-field="city">
                        <button type="button" class="pin-btn" data-target="city" title="조건 고정">📌</button>
                        <select name="city" id="citySelect">
                            <option value="">전체 시도</option>
                            <option th:each="c : ${cityOptions}"
                                    th:value="${c}" th:text="${c}"
                                    th:selected="${city != null and city == c}"></option>
                        </select>
                    </div>
                    <div class="filter-cell" data-field="district">
                        <button type="button" class="pin-btn" data-target="district" title="조건 고정">📌</button>
                        <select name="district" id="districtSelect" th:disabled="${city == null or #strings.isEmpty(city)}">
                            <option value="">전체 시군구</option>
                            <option th:each="d : ${districtOptions}"
                                    th:value="${d}" th:text="${d}"
                                    th:selected="${district != null and district == d}"></option>
                        </select>
                    </div>
                    <div class="filter-cell" data-field="sysNmEn">
                        <button type="button" class="pin-btn" data-target="sysNmEn" title="조건 고정">📌</button>
                        <select name="sysNmEn">
                            <option value="">전체 시스템</option>
                            <option th:each="s : ${sysNmEnOptions}"
                                    th:value="${s}" th:text="${s}"
                                    th:selected="${sysNmEn != null and sysNmEn == s}"></option>
                        </select>
                    </div>
                </div>
                <div class="search-actions">
                    <button type="submit" class="btn-search"><i class="fas fa-magnifying-glass"></i> 검색</button>
                    <button type="button" class="btn-reset" onclick="window.__resetFilters()"><i class="fas fa-rotate-left"></i> 초기화</button>
                </div>
            </form>
        </div>
        <script>
        (function(){
            var PIN_KEY = 'swProjSearchPins';
            var VAL_KEY = 'swProjSearchValues';
            var FIELDS  = ['year','city','district','sysNmEn'];

            function loadPins() {
                try { return JSON.parse(localStorage.getItem(PIN_KEY)) || {}; }
                catch(e) { console.warn('pin parse fail', e); return {}; }
            }
            function savePins(p) { try { localStorage.setItem(PIN_KEY, JSON.stringify(p)); } catch(e) {} }
            function loadVals() {
                try { return JSON.parse(localStorage.getItem(VAL_KEY)) || {}; }
                catch(e) { return {}; }
            }
            function saveVals(v) { try { localStorage.setItem(VAL_KEY, JSON.stringify(v)); } catch(e) {} }

            var urlParams = new URLSearchParams(location.search);
            var pins = loadPins();
            var vals = loadVals();

            // 1. 핀 버튼 상태 초기화 + URL 우선 복원 (OQ-3)
            FIELDS.forEach(function(f) {
                var select = document.querySelector('[name="' + f + '"]');
                var btn = document.querySelector('.pin-btn[data-target="' + f + '"]');
                var cell = document.querySelector('.filter-cell[data-field="' + f + '"]');
                if (!select || !btn || !cell) return;

                if (pins[f]) {
                    btn.classList.add('active');
                    cell.classList.add('pinned');
                    // URL 에 값이 없고 LocalStorage 에만 있으면 복원
                    if (!urlParams.has(f) && vals[f]) {
                        // 옵션에 해당 값이 있어야만 복원 (없으면 DB에 옵션 없음)
                        var exists = Array.prototype.some.call(select.options, function(o) { return o.value === vals[f]; });
                        if (exists) select.value = vals[f];
                    }
                }

                // 핀 토글
                btn.addEventListener('click', function() {
                    pins[f] = !pins[f];
                    if (pins[f]) {
                        btn.classList.add('active');
                        cell.classList.add('pinned');
                        vals[f] = select.value;
                    } else {
                        btn.classList.remove('active');
                        cell.classList.remove('pinned');
                        delete vals[f];
                    }
                    savePins(pins);
                    saveVals(vals);
                });

                // 핀 켜진 필드 값 변경 시 vals 업데이트
                select.addEventListener('change', function() {
                    if (pins[f]) { vals[f] = select.value; saveVals(vals); }
                });
            });

            // 2. 시도 변경 시 시군구 AJAX (NFR-8: 실패 시 기존 옵션 보존)
            var citySelect = document.getElementById('citySelect');
            var distSelect = document.getElementById('districtSelect');
            if (citySelect && distSelect) {
                citySelect.addEventListener('change', function() {
                    var c = citySelect.value;
                    if (!c) {
                        distSelect.innerHTML = '<option value="">전체 시군구</option>';
                        distSelect.disabled = true;
                        return;
                    }
                    distSelect.disabled = false;

                    // NFR-8: 실패 대비 기존 옵션 백업
                    var prevHtml = distSelect.innerHTML;

                    fetch('/projects/api/dist-options?city=' + encodeURIComponent(c))
                        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
                        .then(function(list) {
                            distSelect.innerHTML = '<option value="">전체 시군구</option>';
                            list.forEach(function(d) {
                                var opt = document.createElement('option');
                                opt.value = d; opt.textContent = d;
                                distSelect.appendChild(opt);
                            });
                        })
                        .catch(function(err) {
                            // NFR-8: 기존 옵션 복원 + 경고 placeholder
                            console.warn('dist-options 로드 실패', err);
                            distSelect.innerHTML = prevHtml;
                            var ph = document.createElement('option');
                            ph.textContent = '⚠ 로드 실패 — 새로고침 후 재시도';
                            ph.disabled = true;
                            distSelect.insertBefore(ph, distSelect.firstChild);
                        });
                });
            }

            // 3. 초기화 — 핀 켜진 필드만 유지
            window.__resetFilters = function() {
                var kwInp = document.getElementById('kwInput');
                if (kwInp) kwInp.value = '';
                FIELDS.forEach(function(f) {
                    if (pins[f]) return;
                    var sel = document.querySelector('[name="' + f + '"]');
                    if (sel) sel.value = '';
                });
                // 시군구는 시도가 빈 경우 비활성화
                if (citySelect && distSelect && !citySelect.value) {
                    distSelect.disabled = true;
                }
            };
        })();
        </script>

        <div class="table-area">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>년도</th>
                            <th>시도명</th>
                            <th>시군구명</th>
                            <th>시스템명(영문)</th>
                            <th>PMS코드</th>
                            <th>사업명</th>
                            <th>발주처</th>
                            <th>계약금액</th>
                            <th>계약상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${paging.content}">
                            <td th:text="${p.year}">2026</td>
                            <td th:text="${p.cityNm}">-</td>
                            <td th:text="${p.distNm}">-</td>
                            <td th:text="${p.sysNmEn}">-</td>
                            <td th:text="${p.pmsCd}">-</td>
                            <td class="proj-nm-cell">
                                <a th:href="@{/projects/detail/{id}(id=${p.projId})}" 
                                   th:text="${p.projNm}" class="proj-link">사업명</a>
                            </td>
                            <td th:text="${p.client}">-</td>
                            <td class="amt" th:text="${p.contAmt != null ? #numbers.formatInteger(p.contAmt, 0, 'COMMA') : '0'}">0</td>
                            <td>
                                <span th:if="${p.stat == '1'}" class="status-1">진행중</span>
                                <span th:if="${p.stat == '2'}" class="status-2">완료</span>
                                <span th:unless="${p.stat == '1' or p.stat == '2'}">-</span>
                            </td>
                        </tr>
                        <tr th:if="${paging.totalElements == 0}">
                            <td colspan="9" style="padding: 0;">
                                <div style="padding:72px 24px; text-align:center;">
                                    <div style="width:72px; height:72px; margin:0 auto 18px; border-radius:16px; background:#F5F5F4; color:#A8A29E; display:inline-flex; align-items:center; justify-content:center; font-size:1.8rem;">
                                        <i class="fas fa-folder-open"></i>
                                    </div>
                                    <div style="font-size:0.95rem; font-weight:600; color:#57534E; margin-bottom:6px;">검색 결과가 없습니다</div>
                                    <div style="font-size:0.82rem; color:#A8A29E;">다른 조건으로 검색하거나 신규 사업을 등록해보세요.</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="pagination-container" th:if="${paging.totalPages > 1}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
                    <a th:href="@{/projects/status(page=${paging.number - 1}, kw=${kw != null ? kw : ''}, year=${year}, city=${city}, district=${district}, sysNmEn=${sysNmEn})}">이전</a>
                </li>
                
                <li th:each="page: ${#numbers.sequence(0, paging.totalPages - 1)}"
                    th:if="${page >= paging.number - 5 and page <= paging.number + 5}"
                    class="page-item" th:classappend="${page == paging.number} ? 'active'">
                    <a th:text="${page + 1}" th:href="@{/projects/status(page=${page}, kw=${kw != null ? kw : ''}, year=${year}, city=${city}, district=${district}, sysNmEn=${sysNmEn})}"></a>
                </li>
                
                <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
                    <a th:href="@{/projects/status(page=${paging.number + 1}, kw=${kw != null ? kw : ''}, year=${year}, city=${city}, district=${district}, sysNmEn=${sysNmEn})}">다음</a>
                </li>
            </ul>
        </div>
    </div>

</body>
</html>
