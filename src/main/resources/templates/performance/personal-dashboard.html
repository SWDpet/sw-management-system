<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>개인 성과 대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #FAFAF9; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        .page-header { background: white; border-radius: 12px; padding: 25px 30px; margin-bottom: 20px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); display: flex; justify-content: space-between; align-items: center; }
        .page-header h2 { margin: 0; color: #1565c0; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .header-actions select, .header-actions input { padding: 7px 12px; border: 1px solid #d1d3e2; border-radius: 5px; font-size: 0.85em; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; font-size: 0.85em; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: #1565c0; color: white; }
        .btn-secondary { background: #858796; color: white; }
        .btn-success { background: #1cc88a; color: white; }

        /* 요약 카드 */
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .summary-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 0.1rem 0.75rem rgba(58,59,69,0.1); border-left: 4px solid #ddd; text-align: center; }
        .summary-card .card-label { font-size: 0.78em; color: #888; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .summary-card .card-value { font-size: 1.8em; font-weight: 700; }
        .card-install { border-left-color: #0F766E; }
        .card-install .card-value { color: #0F766E; }
        .card-patch { border-left-color: #1cc88a; }
        .card-patch .card-value { color: #1cc88a; }
        .card-fault { border-left-color: #f08a7e; }
        .card-fault .card-value { color: #f08a7e; }
        .card-support { border-left-color: #f6c23e; }
        .card-support .card-value { color: #f6c23e; }
        .card-inspect { border-left-color: #36b9cc; }
        .card-inspect .card-value { color: #36b9cc; }
        .card-total { border-left-color: #5a5c69; }
        .card-total .card-value { color: #5a5c69; }

        /* 차트 영역 */
        .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-box { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 0.15rem 1.75rem rgba(58,59,69,0.15); }
        .chart-box h4 { margin: 0 0 15px; color: #333; font-size: 1em; }
        .chart-box canvas { max-height: 350px; }

        /* 월별 테이블 */
        .data-table-wrap { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 0.15rem 1.75rem rgba(58,59,69,0.15); }
        .data-table-wrap h4 { margin: 0 0 15px; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: center; font-size: 0.85em; border-bottom: 1px solid #e3e6f0; }
        th { background: #f8f9fc; color: #5a5c69; font-weight: 600; }
        tr:hover { background: #f8f9fc; }
        .user-info { background: white; border-radius: 10px; padding: 15px 20px; margin-bottom: 15px; box-shadow: 0 0.1rem 0.75rem rgba(58,59,69,0.1); display: flex; align-items: center; gap: 15px; }
        .user-info .avatar { width: 50px; height: 50px; border-radius: 50%; background: #0F766E; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.3em; font-weight: 700; }
        .user-info .uname { font-size: 1.1em; font-weight: 700; color: #333; }
        .user-info .urole { font-size: 0.82em; color: #888; }

        @media (max-width: 900px) {
            .chart-row { grid-template-columns: 1fr; }
            .summary-cards { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/top-nav :: nav}"></div>
    <div class="container">
        <!-- 헤더 -->
        <div class="page-header">
            <h2><i class="fas fa-chart-line"></i> 개인 성과 대시보드 (S-01)</h2>
            <div class="header-actions">
                <form method="get" th:action="@{/performance/personal}" style="display:flex; gap:8px; align-items:center;">
                    <select name="userId">
                        <option th:each="u : ${users}" th:value="${u.userSeq}" th:text="${u.username}" th:selected="${u.userSeq == userId}">사용자</option>
                    </select>
                    <select name="year">
                        <option th:each="y : ${#numbers.sequence(2020, 2030)}" th:value="${y}" th:text="${y + '년'}" th:selected="${y == year}">연도</option>
                    </select>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> 조회</button>
                </form>
                <a th:href="@{/performance/report}" class="btn btn-secondary"><i class="fas fa-file-alt"></i> 리포트</a>
                <a th:href="@{/performance/dept}" class="btn btn-success"><i class="fas fa-users"></i> 부서현황</a>
            </div>
        </div>

        <!-- 사용자 정보 -->
        <div class="user-info" th:if="${targetUser != null}">
            <div class="avatar" th:text="${#strings.substring(targetUser.username, 0, 1)}">홍</div>
            <div>
                <div class="uname" th:text="${targetUser.username}">홍길동</div>
                <div class="urole" th:text="${year + '년 성과 현황'}">2026년 성과 현황</div>
            </div>
        </div>

        <!-- 연간 요약 카드 -->
        <div class="summary-cards">
            <div class="summary-card card-install">
                <div class="card-label"><i class="fas fa-server"></i> 설치</div>
                <div class="card-value" th:text="${totals != null ? totals['installTotal'] : 0}">0</div>
            </div>
            <div class="summary-card card-patch">
                <div class="card-label"><i class="fas fa-code-branch"></i> 패치</div>
                <div class="card-value" th:text="${totals != null ? totals['patchTotal'] : 0}">0</div>
            </div>
            <div class="summary-card card-fault">
                <div class="card-label"><i class="fas fa-exclamation-triangle"></i> 장애</div>
                <div class="card-value" th:text="${totals != null ? totals['faultTotal'] : 0}">0</div>
            </div>
            <div class="summary-card card-support">
                <div class="card-label"><i class="fas fa-hands-helping"></i> 지원</div>
                <div class="card-value" th:text="${totals != null ? totals['supportTotal'] : 0}">0</div>
            </div>
            <div class="summary-card card-inspect">
                <div class="card-label"><i class="fas fa-clipboard-check"></i> 점검</div>
                <div class="card-value" th:text="${totals != null ? totals['inspectRate'] : 0}"><span>0</span></div>
            </div>
            <div class="summary-card card-total">
                <div class="card-label"><i class="fas fa-calendar-check"></i> 일정준수</div>
                <div class="card-value"><span th:text="${totals != null ? totals['ontimeRate'] : 0}">0</span>%</div>
            </div>
        </div>

        <!-- 차트 -->
        <div class="chart-row">
            <div class="chart-box">
                <h4><i class="fas fa-chart-bar"></i> 월별 업무 건수 추이</h4>
                <canvas id="monthlyChart"></canvas>
            </div>
            <div class="chart-box">
                <h4><i class="fas fa-chart-doughnut"></i> 업무 유형별 비중</h4>
                <canvas id="typeChart"></canvas>
            </div>
        </div>

        <!-- 월별 상세 테이블 -->
        <div class="data-table-wrap">
            <h4><i class="fas fa-table"></i> 월별 상세 현황</h4>
            <table>
                <thead>
                    <tr>
                        <th>월</th>
                        <th>설치</th>
                        <th>패치</th>
                        <th>장애</th>
                        <th>업무지원</th>
                        <th>점검완료</th>
                        <th>합계</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${#numbers.sequence(0, 11)}">
                        <td th:text="${months[m] + '월'}">1월</td>
                        <td th:text="${installs[m]}">0</td>
                        <td th:text="${patches[m]}">0</td>
                        <td th:text="${faults[m]}">0</td>
                        <td th:text="${supports[m]}">0</td>
                        <td th:text="${inspects[m]}">0</td>
                        <td style="font-weight:700;" th:text="${installs[m] + patches[m] + faults[m] + supports[m] + inspects[m]}">0</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr style="background:#f0f4ff; font-weight:700;">
                        <td>합계</td>
                        <td th:text="${totals != null ? totals['installTotal'] : 0}">0</td>
                        <td th:text="${totals != null ? totals['patchTotal'] : 0}">0</td>
                        <td th:text="${totals != null ? totals['faultTotal'] : 0}">0</td>
                        <td th:text="${totals != null ? totals['supportTotal'] : 0}">0</td>
                        <td>-</td>
                        <td>-</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <!-- 관리자: 성과 집계 -->
        <div th:if="${userAuth == 'EDIT'}" style="margin-top:20px; background:white; border-radius:12px; padding:20px; box-shadow:0 0.1rem 0.75rem rgba(58,59,69,0.1);">
            <h4 style="margin:0 0 12px;"><i class="fas fa-calculator"></i> 성과 집계 실행 (관리자)</h4>
            <div style="display:flex; gap:8px; align-items:center;">
                <select id="calcYear" style="padding:7px 12px; border:1px solid #d1d3e2; border-radius:5px;">
                    <option th:each="y : ${#numbers.sequence(2020, 2030)}" th:value="${y}" th:text="${y + '년'}" th:selected="${y == year}">연도</option>
                </select>
                <select id="calcMonth" style="padding:7px 12px; border:1px solid #d1d3e2; border-radius:5px;">
                    <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m + '월'}">월</option>
                </select>
                <button onclick="runCalculation()" class="btn btn-primary"><i class="fas fa-play"></i> 집계 실행</button>
                <span id="calcResult" style="font-size:0.85em; color:#1cc88a;"></span>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var months = /*[[${months}]]*/ [];
        var installs = /*[[${installs}]]*/ [];
        var patches = /*[[${patches}]]*/ [];
        var faults = /*[[${faults}]]*/ [];
        var supports = /*[[${supports}]]*/ [];
        var inspects = /*[[${inspects}]]*/ [];

        // 월별 업무 건수 Bar Chart
        new Chart(document.getElementById('monthlyChart'), {
            type: 'bar',
            data: {
                labels: months.map(function(m) { return m + '월'; }),
                datasets: [
                    { label: '설치', data: installs, backgroundColor: 'rgba(15, 118, 110,0.8)', borderRadius: 4 },
                    { label: '패치', data: patches, backgroundColor: 'rgba(28,200,138,0.8)', borderRadius: 4 },
                    { label: '장애', data: faults, backgroundColor: 'rgba(231,74,59,0.8)', borderRadius: 4 },
                    { label: '업무지원', data: supports, backgroundColor: 'rgba(246,194,62,0.8)', borderRadius: 4 },
                    { label: '점검완료', data: inspects, backgroundColor: 'rgba(54,185,204,0.8)', borderRadius: 4 }
                ]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'top' } },
                scales: {
                    x: { stacked: false },
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });

        // 유형별 비중 Doughnut
        var totInstall = installs.reduce(function(a, b) { return a + b; }, 0);
        var totPatch = patches.reduce(function(a, b) { return a + b; }, 0);
        var totFault = faults.reduce(function(a, b) { return a + b; }, 0);
        var totSupport = supports.reduce(function(a, b) { return a + b; }, 0);
        var totInspect = inspects.reduce(function(a, b) { return a + b; }, 0);

        new Chart(document.getElementById('typeChart'), {
            type: 'doughnut',
            data: {
                labels: ['설치', '패치', '장애', '업무지원', '점검'],
                datasets: [{
                    data: [totInstall, totPatch, totFault, totSupport, totInspect],
                    backgroundColor: ['#0F766E', '#1cc88a', '#f08a7e', '#f6c23e', '#36b9cc']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom' } }
            }
        });

        function runCalculation() {
            var y = document.getElementById('calcYear').value;
            var m = document.getElementById('calcMonth').value;
            fetch('/performance/api/calculate?year=' + y + '&month=' + m, { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('calcResult').textContent = '✓ ' + data.count + '명 집계 완료';
                        setTimeout(function() { location.reload(); }, 1500);
                    } else {
                        document.getElementById('calcResult').textContent = '✗ ' + (data.error || '집계 실패');
                        document.getElementById('calcResult').style.color = '#f08a7e';
                    }
                });
        }
    </script>
</body>
</html>
