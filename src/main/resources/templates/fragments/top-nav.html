<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- [global-sidebar-responsive] 공통 사이드바 (기존 top-nav :: nav 이름 유지 → 51개 화면 무편집 전파) -->
<th:block th:fragment="nav">

  <!-- [global-sidebar-responsive] self-contained: 토큰 + 사이드바/셸/반응형 CSS 내장 (design-system.css 미링크 페이지에서도 동작) -->
  <style>
  :root{
    --primary:#0F766E; --primary2:#115E59; --primary-lt:#F0FDFA;
    --bg:#FAFAF9; --surface:#fff; --surface-2:#F5F5F4;
    --border:#E7E5E4; --border2:#D6D3D1;
    --text:#1C1917; --text2:#57534E; --muted:#A8A29E;
    --success:#059669; --warning:#D97706; --danger:#DC2626; --info:#0891B2;
    --sb-w:230px;
  }
  body:has(.app-sidebar):not(.no-sidebar){ padding-left:var(--sb-w); transition:padding-left .18s ease; }
  .app-sidebar{ position:fixed; left:0; top:0; height:100vh; width:var(--sb-w); z-index:300;
    background:var(--surface); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto; overflow-x:hidden;
    font-family:'Inter','Noto Sans KR',sans-serif; box-sizing:border-box; }
  .app-sidebar *{ box-sizing:border-box; }
  .app-sidebar .sb-brand{ display:flex; align-items:center; gap:9px; padding:6px 8px 16px; }
  .app-sidebar .sb-brand .chip{ background:var(--primary); color:#fff; font-weight:800; width:30px;height:30px;border-radius:9px; display:inline-flex;align-items:center;justify-content:center; flex-shrink:0; }
  .app-sidebar .sb-brand b{ font-size:.98rem; white-space:nowrap; }
  .app-sidebar .sb-group{ font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); font-weight:700; padding:14px 10px 6px; white-space:nowrap; }
  .app-sidebar .sb-link{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:9px; color:var(--text2); font-weight:600; font-size:.84rem; text-decoration:none; white-space:nowrap; }
  .app-sidebar .sb-link i{ width:18px; text-align:center; color:var(--muted); font-size:.9rem; flex-shrink:0; }
  .app-sidebar .sb-link:hover{ background:var(--surface-2); color:var(--text); }
  .app-sidebar .sb-link.active{ background:var(--primary-lt); color:var(--primary); }
  .app-sidebar .sb-link.active i{ color:var(--primary); }
  .app-sidebar .sb-sub{ padding-left:30px; font-size:.8rem; }
  .app-sidebar .sb-parent{ display:flex; align-items:center; gap:10px; padding:9px 10px 3px; color:var(--text2); font-weight:700; font-size:.82rem; }
  .app-sidebar .sb-parent i{ width:18px; text-align:center; color:var(--muted); font-size:.9rem; flex-shrink:0; }
  .app-sidebar .sb-bottom{ margin-top:auto; }
  .app-sidebar .sb-link.lo:hover{ background:#FEF2F2; color:var(--danger); }
  .app-sidebar .sb-link.lo:hover i{ color:var(--danger); }
  .app-sidebar .sb-user{ display:flex; align-items:center; gap:9px; padding:10px; margin-top:6px; border-top:1px solid var(--border); font-size:.82rem; color:var(--text2); white-space:nowrap; }
  .app-sidebar .sb-user .av{ width:28px;height:28px;border-radius:50%; background:var(--surface-2); display:inline-flex;align-items:center;justify-content:center; flex-shrink:0; }
  .mobile-bar{ display:none; }
  .sb-backdrop{ display:none; }
  @media (max-width:1199px){
    :root{ --sb-w:64px; }
    .app-sidebar{ padding:16px 8px; }
    .app-sidebar .sb-brand b, .app-sidebar .sb-group, .app-sidebar .sb-link span, .app-sidebar .sb-parent span, .app-sidebar .sb-user .nm{ display:none; }
    .app-sidebar .sb-link, .app-sidebar .sb-parent{ justify-content:center; padding:10px 0; }
    .app-sidebar .sb-link i, .app-sidebar .sb-parent i{ width:auto; font-size:1.05rem; }
    .app-sidebar .sb-sub{ padding-left:0; }
  }
  @media (max-width:767px){
    :root{ --sb-w:0px; }
    body:has(.app-sidebar):not(.no-sidebar){ padding-left:0; padding-top:52px; }
    .mobile-bar{ display:flex; position:fixed; top:0; left:0; right:0; height:52px; z-index:280;
      align-items:center; gap:12px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); }
    .mobile-bar .ham{ background:none; border:none; font-size:1.2rem; color:var(--text); cursor:pointer; }
    .mobile-bar .chip{ background:var(--primary); color:#fff; font-weight:800; padding:5px 11px; border-radius:8px; font-size:.85rem; }
    .app-sidebar{ width:230px; transform:translateX(-100%); transition:transform .22s ease; box-shadow:0 0 30px rgba(0,0,0,.18); }
    .app-sidebar.open{ transform:none; }
    .app-sidebar .sb-brand b, .app-sidebar .sb-group, .app-sidebar .sb-link span, .app-sidebar .sb-parent span, .app-sidebar .sb-user .nm{ display:inline; }
    .app-sidebar .sb-link, .app-sidebar .sb-parent{ justify-content:flex-start; padding:9px 10px; }
    .app-sidebar .sb-link i{ width:18px; font-size:.9rem; }
    .app-sidebar .sb-sub{ padding-left:30px; }
    .sb-backdrop.show{ display:block; position:fixed; inset:0; z-index:270; background:rgba(0,0,0,.4); }
  }
  @media print{
    .app-sidebar, .mobile-bar, .sb-backdrop{ display:none !important; }
    body:has(.app-sidebar){ padding-left:0 !important; padding-top:0 !important; }
  }
  body.fullscreen:has(.app-sidebar){ padding-left:0; }
  body.fullscreen .app-sidebar, body.fullscreen .mobile-bar{ display:none; }
  </style>

  <!-- 모바일 상단바 (햄버거) -->
  <div class="mobile-bar">
    <button type="button" class="ham" aria-label="메뉴 열기" onclick="swToggleSidebar()"><i class="fas fa-bars"></i></button>
    <a href="/" style="text-decoration:none;"><span class="chip">SW Manager</span></a>
  </div>
  <div class="sb-backdrop" onclick="swToggleSidebar(false)"></div>

  <!-- 사이드바 -->
  <nav class="app-sidebar" aria-label="주 메뉴">
    <a href="/" class="sb-brand" style="text-decoration:none; color:inherit;">
      <span class="chip">SW</span><b>SW Manager</b>
    </a>

    <!-- 개요 -->
    <div class="sb-group">개요</div>
    <a class="sb-link" href="/" data-prefix="/__home" sec:authorize="isAuthenticated()"><i class="fas fa-gauge-high"></i><span>대시보드</span></a>
    <a class="sb-link" href="/performance/personal" data-prefix="/performance"
       th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')') or (#authentication.principal.user?.authPerformance != null and #authentication.principal.user.authPerformance != 'NONE')}" sec:authorize="isAuthenticated()"><i class="fas fa-chart-line"></i><span>성과통계</span></a>

    <!-- 사업 -->
    <div class="sb-group">사업</div>
    <a class="sb-link" href="/projects/status" data-prefix="/projects"
       th:if="${#authentication.principal.user?.authProject != 'NONE'}" sec:authorize="isAuthenticated()"><i class="fas fa-briefcase"></i><span>사업관리</span></a>
    <a class="sb-link" href="/workplan/calendar" data-prefix="/workplan"
       th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')') or (#authentication.principal.user?.authWorkPlan != null and #authentication.principal.user.authWorkPlan != 'NONE')}" sec:authorize="isAuthenticated()"><i class="fas fa-calendar-days"></i><span>업무계획</span></a>
    <!-- 문서관리 그룹 (상위 헤더 + 하위 사업문서/운영문서) -->
    <th:block th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')') or (#authentication.principal.user?.authDocument != null and #authentication.principal.user.authDocument != 'NONE')}" sec:authorize="isAuthenticated()">
      <div class="sb-parent"><i class="fas fa-file-lines"></i><span>문서관리</span></div>
      <a class="sb-link sb-sub" href="/document/list" data-prefix="/document"><i class="fas fa-folder-open"></i><span>사업문서</span></a>
      <a class="sb-link sb-sub" href="/ops-doc/list" data-prefix="/ops-doc"><i class="fas fa-screwdriver-wrench"></i><span>운영문서</span></a>
      <a class="sb-link sb-sub" href="/ops-kb" data-prefix="/ops-kb"><i class="fas fa-book-medical"></i><span>지식베이스</span></a>
    </th:block>
    <a class="sb-link" href="/person/list" data-prefix="/person"
       th:if="${#authentication.principal.user?.authPerson != 'NONE'}" sec:authorize="isAuthenticated()"><i class="fas fa-users"></i><span>담당자관리</span></a>

    <!-- 자산 -->
    <div class="sb-group">자산</div>
    <a class="sb-link" href="/infra/list" data-prefix="/infra"
       th:if="${#authentication.principal.user?.authInfra != null and #authentication.principal.user.authInfra != 'NONE'}" sec:authorize="isAuthenticated()"><i class="fas fa-server"></i><span>서버관리</span></a>
    <!-- 라이선스 그룹 -->
    <th:block th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')') or (#authentication.principal.user?.authLicense != null and #authentication.principal.user.authLicense != 'NONE')}" sec:authorize="isAuthenticated()">
      <a class="sb-link" href="/license/registry/list" data-prefix="/license"><i class="fas fa-clipboard-list"></i><span>라이선스 대장</span></a>
      <a class="sb-link sb-sub" href="/geonuris/license/list" data-prefix="/geonuris"><i class="fas fa-key"></i><span>GeoNURIS</span></a>
    </th:block>
    <!-- 견적서 그룹 -->
    <th:block th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')') or (#authentication.principal.user?.authQuotation != null and #authentication.principal.user.authQuotation != 'NONE')}" sec:authorize="isAuthenticated()">
      <a class="sb-link" href="/quotation/list" data-prefix="/quotation"><i class="fas fa-file-invoice-dollar"></i><span>견적서</span></a>
    </th:block>

    <!-- 관리자 -->
    <th:block th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
      <div class="sb-group">관리자</div>
      <a class="sb-link" href="/admin/users" data-prefix="/admin/users"><i class="fas fa-user-check"></i><span>사용자 승인</span></a>
      <a class="sb-link" href="/admin/org-units" data-prefix="/admin/org-units"><i class="fas fa-sitemap"></i><span>조직도</span></a>
      <a class="sb-link" href="/admin/logs" data-prefix="/admin/logs"><i class="fas fa-list-check"></i><span>로그</span></a>
      <a class="sb-link" href="/admin/system-graph" data-prefix="/admin/system-graph"><i class="fas fa-diagram-project"></i><span>시스템 관계도</span></a>
    </th:block>

    <!-- 하단: 계정 -->
    <div class="sb-bottom">
      <div class="sb-group">계정</div>
      <a class="sb-link" href="/mypage" data-prefix="/mypage"><i class="fas fa-circle-user"></i><span>마이페이지</span></a>
      <a class="sb-link lo" href="/logout" data-prefix="/__logout"><i class="fas fa-arrow-right-from-bracket"></i><span>로그아웃</span></a>
      <div class="sb-user" sec:authorize="isAuthenticated()">
        <span class="av"><i class="fas fa-user"></i></span>
        <span class="nm" sec:authentication="name">사용자</span>
      </div>
    </div>
  </nav>

  <script th:inline="none">
    // 모바일 드로어 토글
    function swToggleSidebar(force){
      var sb = document.querySelector('.app-sidebar');
      var bd = document.querySelector('.sb-backdrop');
      if(!sb) return;
      var open = (typeof force === 'boolean') ? force : !sb.classList.contains('open');
      sb.classList.toggle('open', open);
      if(bd) bd.classList.toggle('show', open);
    }
    // 활성 메뉴 (현재 경로 prefix 매칭)
    (function(){
      var path = window.location.pathname;
      var links = document.querySelectorAll('.app-sidebar .sb-link[data-prefix]');
      var best = null, bestLen = -1;
      links.forEach(function(a){
        var p = a.getAttribute('data-prefix');
        if(p === '/__home'){ if(path === '/' && bestLen < 1){ best = a; bestLen = 1; } return; }
        if(p === '/__logout') return;
        if(path === p || path.indexOf(p + '/') === 0 || path === p){
          if(p.length > bestLen){ best = a; bestLen = p.length; }
        }
      });
      if(best) best.classList.add('active');
      // Esc 로 드로어 닫기
      document.addEventListener('keydown', function(e){ if(e.key === 'Escape') swToggleSidebar(false); });
    })();
  </script>

</th:block>

</body>
</html>
