<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인프라 자산 현황</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #FAFAF9; padding: 40px 20px; color: #333; margin: 0; }
        .container { max-width: 1800px; margin: auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15); }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .page-header h2 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        
        .mode-prod h2 { color: #134E4A; }
        .mode-test h2 { color: #e65100; }
        
        .header-btns { display: flex; gap: 10px; align-items: center; }
        .btn-top {
            text-decoration: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px; transition: 0.3s;
        }
        .btn-home { background: #0F766E; }
        .btn-add { background: #1cc88a; }
        
        .btn-switch { background: #fff; color: #555; border: 2px solid #ddd; }
        .btn-switch:hover { background: #F5F5F4; border-color: #ccc; }
        .btn-switch.active { background: #333; color: white; border-color: #333; }

        /* [수정] 통합 검색바 스타일 */
        .search-box {
            background: #f8f9fc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e3e6f0;
            display: flex; gap: 10px; align-items: center; justify-content: center;
        }
        .search-input {
            width: 400px; padding: 10px 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; outline: none;
        }
        .btn-search { background: #0F766E; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; }
        .btn-reset { background: #858796; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 1em; display: flex; align-items: center; font-weight: bold;}

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: #fff; border: 1px solid #e3e6f0; min-width: 1400px; }
        th, td { padding: 10px 8px; border: 1px solid #e3e6f0; text-align: center; font-size: 0.9em; vertical-align: middle; }
        th { background: #f8f9fc; color: #134E4A; font-weight: bold; }
        
        .th-group-web { background-color: #e3f2fd; color: #0d47a1; border-bottom: 2px solid #1976d2; }
        .th-group-db { background-color: #fff3e0; color: #e65100; border-bottom: 2px solid #f57c00; }

        .cell-link { font-weight: bold; color: #0F766E; text-decoration: none; cursor: pointer; }
        .cell-link:hover { text-decoration: underline; color: #115E59; }
        .cell-pw { cursor: pointer; color: #f08a7e; font-weight: bold; }
        .cell-pw:hover { text-decoration: underline; }

        .btn-action { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; color: white; margin: 2px; }
        .btn-del { background: #f08a7e; }
        .btn-del:hover { background: #c62828; }
        .empty-row { padding: 50px; text-align: center; color: #858796; }
        .pw-hidden { display: none; }
        .pw-mask { display: inline; }

        .pagination { display: flex; justify-content: center; margin-top: 20px; gap: 5px; }
        .pagination a { 
            padding: 8px 12px; border: 1px solid #ddd; color: #333; text-decoration: none; border-radius: 4px; font-size: 0.9rem; transition: 0.2s; background: white;
        }
        .pagination a.active { background-color: #134E4A; color: white; border-color: #134E4A; font-weight: bold; }
        .pagination a:hover:not(.active) { background-color: #f1f3f9; }
        .pagination a.disabled { pointer-events: none; color: #ccc; border-color: #eee; background: #f9f9f9; }
    </style>
</head>
<body>
<div th:replace="~{fragments/top-nav :: nav}"></div>
    <div class="container" th:classappend="${currentType == 'TEST'} ? 'mode-test' : 'mode-prod'">
        <div class="page-header">
            <h2>
                <i class="fas" th:classappend="${currentType == 'TEST'} ? 'fa-vial' : 'fa-server'"></i>
                <span th:text="${currentType == 'TEST'} ? '테스트 인프라 자산 현황' : '운영 인프라 자산 현황'"></span>
            </h2>
            <div class="header-btns">
                <a th:if="${currentType == 'PROD'}" href="/infra/list?type=TEST" class="btn-top btn-switch">
                    <i class="fas fa-exchange-alt"></i> 테스트 현황으로 이동
                </a>
                <a th:if="${currentType == 'TEST'}" href="/infra/list?type=PROD" class="btn-top btn-switch active" style="background:#e65100; border-color:#e65100;">
                    <i class="fas fa-exchange-alt"></i> 운영 현황으로 이동
                </a>
                <a th:if="${userAuth == 'EDIT'}" th:href="@{/infra/new}" class="btn-top btn-add"><i class="fas fa-plus"></i> 자산 등록</a>
            </div>
        </div>

        <form class="search-box" action="/infra/list" method="get">
            <input type="hidden" name="type" th:value="${currentType}">
            
            <input type="text" name="keyword" class="search-input" th:value="${keyword}" 
                   placeholder="검색어 입력 (시도, 시군구, IP, OS, ID 등 통합 검색)">
            
            <button type="submit" class="btn-search"><i class="fas fa-search"></i> 검색</button>
            <a th:href="@{/infra/list(type=${currentType})}" class="btn-reset"><i class="fas fa-sync-alt"></i> 초기화</a>
        </form>

        <div class="table-responsive">
            <table>
                <colgroup>
                    <col style="width: 4%;"> <col style="width: 8%;"> <col style="width: 8%;"> <col style="width: 10%;">
                    <col style="width: 10%;"> <col style="width: 10%;"> <col style="width: 8%;"> <col style="width: 8%;">
                    <col style="width: 10%;"> <col style="width: 10%;"> <col style="width: 7%;"> <col style="width: 7%;">
                    <col style="width: 6%;"> 
                </colgroup>
                <thead>
                    <tr>
                        <th rowspan="2">No</th>
                        <th rowspan="2">시도</th>
                        <th rowspan="2">시군구</th>
                        <th rowspan="2">시스템명</th>
                        <th colspan="4" class="th-group-web"><i class="fas fa-globe"></i> WEB / WAS 서버</th>
                        <th colspan="4" class="th-group-db"><i class="fas fa-database"></i> DB 서버</th>
                        <th rowspan="2">관리</th>
                    </tr>
                    <tr>
                        <th class="th-group-web">IP 주소</th>
                        <th class="th-group-web">OS</th>
                        <th class="th-group-web">ID</th>
                        <th class="th-group-web">PW</th>
                        
                        <th class="th-group-db">IP 주소</th>
                        <th class="th-group-db">OS</th>
                        <th class="th-group-db">ID</th>
                        <th class="th-group-db">PW</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="infra, stat : ${infraList}">
                        <td th:text="${infraList.totalElements - (infraList.number * infraList.size) - stat.index}"></td>
                        <td th:text="${infra.cityNm}"></td>
                        <td>
                            <a th:href="@{/infra/detail/{id}(id=${infra.infraId})}" 
                               th:text="${infra.distNm}" class="cell-link"></a>
                        </td>
                        <td th:text="${infra.sysNm}"></td>

                        <th:block th:with="webServer=${infra.servers.^[serverType == 'WEB']}, dbServer=${infra.servers.^[serverType == 'DB']}">
                            <td th:text="${webServer?.ipAddr} ?: '-'"></td>
                            <td th:text="${webServer?.osNm} ?: '-'"></td>
                            <td th:text="${webServer?.accId} ?: '-'"></td>
                            <td class="cell-pw" onclick="togglePassword(this)">
                                <span class="pw-mask">********</span>
                                <span class="pw-hidden" th:text="${webServer?.accPw} ?: '-'"></span>
                            </td>

                            <td th:text="${dbServer?.ipAddr} ?: '-'"></td>
                            <td th:text="${dbServer?.osNm} ?: '-'"></td>
                            <td th:text="${dbServer?.accId} ?: '-'"></td>
                            <td class="cell-pw" onclick="togglePassword(this)">
                                <span class="pw-mask">********</span>
                                <span class="pw-hidden" th:text="${dbServer?.accPw} ?: '-'"></span>
                            </td>
                        </th:block>

                        <td>
                            <button class="btn-action btn-del" th:onclick="|deleteInfra(${infra.infraId})|">삭제</button>
                        </td>
                    </tr>
                    <tr th:if="${infraList.totalElements == 0}">
                        <td colspan="13" class="empty-row">데이터가 없습니다.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${infraList.totalPages > 0}"
             th:with="start=${(infraList.number/10)*10 + 1}, end=(${infraList.totalPages == 0 ? 1 : (start + 9 < infraList.totalPages ? start + 9 : infraList.totalPages)})">
            
            <a th:href="@{/infra/list(page=${infraList.number - 1}, type=${currentType}, keyword=${keyword})}" 
               th:classappend="${infraList.first} ? 'disabled'">&lt;</a>

            <th:block th:each="page: ${#numbers.sequence(start, end)}">
                <a th:href="@{/infra/list(page=${page - 1}, type=${currentType}, keyword=${keyword})}" 
                   th:text="${page}" 
                   th:classappend="${page == infraList.number + 1} ? 'active'">1</a>
            </th:block>

            <a th:href="@{/infra/list(page=${infraList.number + 1}, type=${currentType}, keyword=${keyword})}" 
               th:classappend="${infraList.last} ? 'disabled'">&gt;</a>
        </div>

    </div>

    <script th:inline="javascript">
        function togglePassword(element) {
            const mask = element.querySelector('.pw-mask');
            const hidden = element.querySelector('.pw-hidden');
            if (mask.style.display === 'none') {
                mask.style.display = 'inline'; hidden.style.display = 'none';
            } else {
                mask.style.display = 'none'; hidden.style.display = 'inline';
                setTimeout(() => { mask.style.display = 'inline'; hidden.style.display = 'none'; }, 3000);
            }
        }
        function deleteInfra(id) {
            if(confirm("정말로 삭제하시겠습니까?")) {
                var form = document.createElement("form");
                form.setAttribute("method", "post");
                form.setAttribute("action", "/infra/delete/" + id);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
</body>
