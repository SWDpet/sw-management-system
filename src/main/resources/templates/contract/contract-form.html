<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사업현황 등록/수정</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f4f7f6; padding: 40px 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); }
        .page-header { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .page-header h2 { margin: 0; color: #1565c0; }

        .section-title { font-size: 1.1em; font-weight: 700; color: #1565c0; margin: 35px 0 15px 0; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #1565c0; padding-bottom: 8px; }
        .form-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; border: 1px solid #d1d3e2; }
        .form-table th { background: #e3f2fd; color: #1565c0; font-weight: 600; padding: 10px 12px; border: 1px solid #bbdefb; text-align: center; white-space: nowrap; font-size: 0.9em; width: 14%; }
        .form-table td { padding: 0; border: 1px solid #d1d3e2; height: 40px; }
        .input-cell { width: 100%; height: 100%; border: none; padding: 0 10px; font-size: 0.9em; outline: none; box-sizing: border-box; }
        .input-cell:focus { background: #f0f8ff; }
        .select-cell { width: 100%; height: 100%; border: none; outline: none; padding: 0 8px; font-size: 0.9em; cursor: pointer; background: transparent; }

        .th-client { background: #e8f5e9 !important; color: #2e7d32 !important; }
        .th-sub { background: #fff3e0 !important; color: #e65100 !important; }

        .amount-display { font-size: 0.85em; color: #1565c0; font-weight: 600; padding: 0 10px; line-height: 40px; }
        .date-input { text-align: center; }

        .btn-area { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn { padding: 12px 30px; border: none; border-radius: 5px; font-size: 1em; font-weight: bold; cursor: pointer; color: white; margin: 0 5px; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-save { background: #1565c0; }
        .btn-list { background: #858796; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .sub-section { border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin: 15px 0; background: #fafafa; }
        .sub-section.hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h2><i class="fas fa-chart-line"></i>
                <span th:text="${contract.contractId != null} ? '사업현황 수정' : '사업현황 등록'"></span>
            </h2>
        </div>

        <form id="contractForm" th:action="@{/contract/save}" method="post" th:object="${contract}">
            <input type="hidden" th:field="*{contractId}">

            <!-- 기본 정보 -->
            <div class="section-title"><i class="fas fa-file-contract"></i> 계약 정보</div>
            <table class="form-table">
                <colgroup>
                    <col style="width: 14%;"><col style="width: 36%;">
                    <col style="width: 14%;"><col style="width: 36%;">
                </colgroup>
                <tr>
                    <th>지자체 (인프라)</th>
                    <td>
                        <select th:field="*{infraId}" class="select-cell">
                            <option value="">-- 지자체 선택 --</option>
                            <option th:each="infra : ${infraList}"
                                    th:value="${infra.infraId}"
                                    th:text="${infra.cityNm + ' ' + infra.distNm + ' (' + infra.sysNm + ')'}"></option>
                        </select>
                    </td>
                    <th>계약 연도</th>
                    <td><input type="number" th:field="*{contractYear}" class="input-cell" placeholder="ex) 2026" style="text-align: center;"></td>
                </tr>
                <tr>
                    <th>용역명 (사업명)</th>
                    <td colspan="3"><input type="text" th:field="*{contractName}" class="input-cell" placeholder="유지보수 용역명을 입력하세요" required></td>
                </tr>
                <tr>
                    <th>계약번호</th>
                    <td><input type="text" th:field="*{contractNo}" class="input-cell" placeholder="계약번호"></td>
                    <th>계약유형</th>
                    <td>
                        <select th:field="*{contractType}" class="select-cell" onchange="toggleSubcontract(this.value)">
                            <option value="UNIT_PRICE">단가계약</option>
                            <option value="PROCUREMENT">조달계약</option>
                            <option value="PRIVATE">수의계약</option>
                            <option value="SUBCONTRACT">하도급계약</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>계약금액 (원)</th>
                    <td>
                        <input type="number" th:field="*{contractAmount}" class="input-cell" placeholder="숫자만 입력" oninput="updateAmountText()">
                    </td>
                    <th>한글 금액</th>
                    <td><div id="amountText" class="amount-display"></div></td>
                </tr>
                <tr>
                    <th>계약보증금 (원)</th>
                    <td><input type="number" th:field="*{guaranteeAmount}" class="input-cell" placeholder="계약보증금"></td>
                    <th>보증금율 (%)</th>
                    <td><input type="number" step="0.01" th:field="*{guaranteeRate}" class="input-cell" placeholder="ex) 10.00" style="text-align: center;"></td>
                </tr>
                <tr>
                    <th>계약일</th>
                    <td><input type="text" th:field="*{contractDate}" class="input-cell date-input" placeholder="YYYY-MM-DD" maxlength="10"></td>
                    <th>진행상태</th>
                    <td>
                        <select th:field="*{progressStatus}" class="select-cell">
                            <option value="BUDGET">예산제안</option>
                            <option value="CONTRACTING">계약진행</option>
                            <option value="COMMENCED">착수</option>
                            <option value="IN_PROGRESS">수행중</option>
                            <option value="INTERIM">기성</option>
                            <option value="COMPLETED">준공</option>
                            <option value="SETTLED">정산완료</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>착수일</th>
                    <td><input type="text" th:field="*{startDate}" class="input-cell date-input" placeholder="YYYY-MM-DD" maxlength="10"></td>
                    <th>준공예정일</th>
                    <td><input type="text" th:field="*{endDate}" class="input-cell date-input" placeholder="YYYY-MM-DD" maxlength="10"></td>
                </tr>
                <tr>
                    <th>실제준공일</th>
                    <td><input type="text" th:field="*{actualEndDate}" class="input-cell date-input" placeholder="YYYY-MM-DD" maxlength="10"></td>
                    <td colspan="2"></td>
                </tr>
                <tr>
                    <th>계약방법</th>
                    <td><input type="text" th:field="*{contractMethod}" class="input-cell" placeholder="ex) 일반경쟁입찰"></td>
                    <th>계약법규분</th>
                    <td><input type="text" th:field="*{contractLaw}" class="input-cell" placeholder="ex) 지방계약법"></td>
                </tr>
                <tr>
                    <th>조항호</th>
                    <td colspan="3"><input type="text" th:field="*{contractClause}" class="input-cell" placeholder="ex) 제9조제1항제2호"></td>
                </tr>
            </table>

            <!-- 발주처 정보 -->
            <div class="section-title"><i class="fas fa-building"></i> 발주처 정보</div>
            <table class="form-table">
                <colgroup>
                    <col style="width: 14%;"><col style="width: 36%;">
                    <col style="width: 14%;"><col style="width: 36%;">
                </colgroup>
                <tr>
                    <th class="th-client">발주처 기관명</th>
                    <td><input type="text" th:field="*{clientOrg}" class="input-cell" placeholder="발주처 기관명"></td>
                    <th class="th-client">담당부서</th>
                    <td><input type="text" th:field="*{clientDept}" class="input-cell"></td>
                </tr>
                <tr>
                    <th class="th-client">주소</th>
                    <td colspan="3"><input type="text" th:field="*{clientAddr}" class="input-cell" placeholder="발주처 주소"></td>
                </tr>
                <tr>
                    <th class="th-client">전화번호</th>
                    <td><input type="text" th:field="*{clientPhone}" class="input-cell" placeholder="ex) 063-123-4567"></td>
                    <th class="th-client">FAX</th>
                    <td><input type="text" th:field="*{clientFax}" class="input-cell" placeholder="ex) 063-123-4568"></td>
                </tr>
                <tr>
                    <th class="th-client">담당자명</th>
                    <td><input type="text" th:field="*{clientContact}" class="input-cell"></td>
                    <th class="th-client">담당자 연락처</th>
                    <td><input type="text" th:field="*{clientContactPhone}" class="input-cell"></td>
                </tr>
            </table>

            <!-- 하도급 정보 -->
            <div id="subcontractSection" class="sub-section" th:classappend="${contract.contractType != 'SUBCONTRACT'} ? 'hidden' : ''">
                <div class="section-title" style="color: #e65100; border-color: #e65100;"><i class="fas fa-handshake"></i> 하도급 정보</div>
                <table class="form-table">
                    <colgroup>
                        <col style="width: 14%;"><col style="width: 36%;">
                        <col style="width: 14%;"><col style="width: 36%;">
                    </colgroup>
                    <tr>
                        <th class="th-sub">주사업자 회사명</th>
                        <td><input type="text" th:field="*{primeContractor}" class="input-cell"></td>
                        <th class="th-sub">하도급 형태</th>
                        <td><input type="text" th:field="*{subcontractType}" class="input-cell"></td>
                    </tr>
                    <tr>
                        <th class="th-sub">하도급 금액</th>
                        <td><input type="number" th:field="*{subcontractAmount}" class="input-cell" placeholder="숫자만 입력"></td>
                        <th class="th-sub">발주서 번호</th>
                        <td><input type="text" th:field="*{purchaseOrderNo}" class="input-cell"></td>
                    </tr>
                </table>
            </div>

            <div class="btn-area">
                <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> 저장하기</button>
                <a href="/contract/list" class="btn btn-list"><i class="fas fa-list"></i> 목록으로</a>
            </div>
        </form>
    </div>

    <script>
        function toggleSubcontract(val) {
            var sec = document.getElementById('subcontractSection');
            if (val === 'SUBCONTRACT') {
                sec.classList.remove('hidden');
            } else {
                sec.classList.add('hidden');
            }
        }

        function updateAmountText() {
            var amount = document.getElementById('contractAmount').value;
            var display = document.getElementById('amountText');
            if (!amount || amount <= 0) { display.textContent = ''; return; }
            display.textContent = convertToKorean(parseInt(amount));
        }

        function convertToKorean(num) {
            if (!num || num === 0) return '';
            var units = ['', '만', '억', '조'];
            var digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
            var subUnits = ['', '십', '백', '천'];
            var result = '';
            var unitIdx = 0;

            while (num > 0) {
                var part = num % 10000;
                if (part > 0) {
                    var partStr = '';
                    var pos = 0;
                    var p = part;
                    while (p > 0) {
                        var d = p % 10;
                        if (d > 0) {
                            var dStr = (d === 1 && pos > 0) ? '' : digits[d];
                            partStr = dStr + subUnits[pos] + partStr;
                        }
                        p = Math.floor(p / 10);
                        pos++;
                    }
                    result = partStr + units[unitIdx] + ' ' + result;
                }
                num = Math.floor(num / 10000);
                unitIdx++;
            }
            return '금 ' + result.trim() + '원정';
        }

        // 날짜 자동 포맷
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('date-input')) {
                var val = e.target.value.replace(/\D/g, '');
                var result = '';
                if (val.length <= 4) result = val;
                else if (val.length <= 6) result = val.substring(0, 4) + '-' + val.substring(4);
                else result = val.substring(0, 4) + '-' + val.substring(4, 6) + '-' + val.substring(6, 8);
                e.target.value = result;
            }
        });

        // Enter 키 방지
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
            if (e.key === 'End') {
                e.preventDefault();
                document.querySelector('.btn-save').click();
            }
        });

        // 초기 금액 표시
        document.addEventListener('DOMContentLoaded', function() { updateAmountText(); });
    </script>
</body>
</html>
