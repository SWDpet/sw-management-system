<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW Manager — 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:   #0F766E;
            --primary2:  #115E59;
            --bg:        #FAFAF9;
            --text:      #1C1917;
            --text2:     #57534E;
            --muted:     #A8A29E;
            --border:    #E7E5E4;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; position: relative;
            color: var(--text);
            overflow: hidden;
        }

        /* Minimal Gradient Mesh — 부드러운 다색 블러 */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 900px 700px at 82% 18%, rgba(15,118,110,0.22) 0%, transparent 60%),
                radial-gradient(ellipse 800px 600px at 18% 85%, rgba(20,184,166,0.18) 0%, transparent 62%),
                radial-gradient(ellipse 700px 500px at 50% 50%, rgba(240,138,126,0.08) 0%, transparent 65%),
                radial-gradient(ellipse 600px 500px at 95% 95%, rgba(251,223,185,0.22) 0%, transparent 70%),
                radial-gradient(ellipse 700px 500px at 5% 5%,   rgba(99,205,197,0.12) 0%, transparent 65%);
            filter: blur(0.5px);
            pointer-events: none;
        }

        /* 아주 미세한 그레인 텍스처 (선택) */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
            opacity: 0.06;
            pointer-events: none;
            mix-blend-mode: multiply;
        }


        /* 브랜드 헤드 */
        .brand-head {
            position: relative; z-index: 2;
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 22px;
        }
        .brand-head .brand-chip {
            background: var(--primary); color: #fff;
            padding: 8px 15px; border-radius: 9px;
            font-weight: 800; font-size: 1rem; letter-spacing: -0.005em;
            font-family: 'Inter','Noto Sans KR',sans-serif; line-height: 1;
            box-shadow: 0 6px 20px rgba(15,118,110,0.25);
        }
        .brand-head .brand-tag {
            font-size: 0.78rem; color: var(--text2); font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* 로그인 카드 */
        .login-wrap {
            position: relative; z-index: 2;
            width: 100%; max-width: 420px;
            padding: 0 20px;
        }
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 34px 32px 28px;
            box-shadow:
                0 2px 4px rgba(17,17,27,0.04),
                0 24px 48px rgba(17,17,27,0.08),
                0 0 0 1px rgba(15,118,110,0.06);
        }

        .login-card h2 {
            font-size: 1.35rem; font-weight: 700; color: var(--text);
            margin-bottom: 4px; letter-spacing: -0.01em;
        }
        .login-card .subtitle {
            font-size: 0.82rem; color: var(--muted);
            margin-bottom: 26px;
        }

        .input-group { margin-bottom: 14px; }
        .input-group label {
            display: block; font-size: 0.76rem; font-weight: 600;
            color: var(--text2); margin-bottom: 6px; letter-spacing: 0.02em;
        }
        .input-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 0.92rem; font-family: 'Noto Sans KR', sans-serif;
            color: var(--text); background: #FAFAF9;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary); background: #fff;
            box-shadow: 0 0 0 3px rgba(15,118,110,0.12);
        }
        .input-group input::placeholder { color: #C9C5C1; }

        .btn-login {
            width: 100%; padding: 13px;
            border: none; border-radius: 10px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary2) 100%);
            color: #fff; font-size: 0.96rem; font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
            margin-top: 10px; letter-spacing: 0.04em;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 4px 14px rgba(15,118,110,0.28);
        }
        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(15,118,110,0.38); }
        .btn-login:active { transform: translateY(0); }

        .msg-error {
            display: flex; align-items: center; gap: 8px;
            background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626;
            padding: 10px 14px; border-radius: 8px; margin-bottom: 18px;
            font-size: 0.84rem; font-weight: 500;
        }
        .msg-logout {
            display: flex; align-items: center; gap: 8px;
            background: #F0FDFA; border: 1px solid #99F6E4; color: var(--primary2);
            padding: 10px 14px; border-radius: 8px; margin-bottom: 18px;
            font-size: 0.84rem; font-weight: 500;
        }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0 16px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider span { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

        .signup-link { text-align: center; font-size: 0.84rem; color: var(--text2); }
        .signup-link a { color: var(--primary); font-weight: 700; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }

        .login-footer {
            position: relative; z-index: 2;
            margin-top: 22px;
            font-size: 0.72rem; color: var(--muted);
            text-align: center; letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

    <div class="brand-head">
        <span class="brand-chip">SW Manager</span>
        <span class="brand-tag">· 사업·라이선스·담당자 통합관리</span>
    </div>

    <div class="login-wrap">
        <div class="login-card">
            <h2>로그인</h2>
            <p class="subtitle">시스템 이용을 위해 로그인해 주세요.</p>

            <form th:action="@{/login}" method="post">
                <div th:if="${param.error}" class="msg-error">
                    <span>⚠️</span>
                    아이디/비밀번호가 틀렸거나 승인 대기 중입니다.
                </div>
                <div th:if="${param.logout}" class="msg-logout">
                    <span>✅</span>
                    로그아웃 되었습니다.
                </div>

                <div class="input-group">
                    <label for="userid">아이디</label>
                    <input type="text" id="userid" name="userid"
                           placeholder="아이디를 입력하세요"
                           required autofocus autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password"
                           placeholder="비밀번호를 입력하세요"
                           required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login">로그인</button>
            </form>

            <div class="divider"><span>계정이 없으신가요?</span></div>
            <div class="signup-link">
                <a th:href="@{/signup}">회원가입 신청하기</a>
            </div>
        </div>
    </div>

    <div class="login-footer">© SW Management System. All rights reserved.</div>
</body>
</html>
