<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>설치보고서</title>
    <link rel="stylesheet" th:href="@{/css/ops-doc.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/top-nav :: top-nav}"></div>

<main class="ops-page">
    <div class="ops-breadcrumb">
        <a th:href="@{/}">홈</a> &rsaquo; <a th:href="@{/ops-doc/list}">운영·유지보수 문서</a> &rsaquo; 설치보고서
    </div>
    <div class="ops-page-header">
        <span class="group-chip">운영문서</span>
        <h1><span class="ops-type-chip ops-type-INSTALL">설치</span> 설치보고서</h1>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">설치 정보</h3>
        <table class="ops-form-table">
            <tr><th>제목</th><td><input type="text" id="title"></td></tr>
            <tr><th>설치일</th><td><input type="date" id="install_date"></td>
                <th>환경 *</th>
                <td>
                    <select id="environment">
                        <option value="">선택</option>
                        <option value="PROD">운영</option>
                        <option value="TEST">테스트</option>
                    </select>
                </td>
            </tr>
            <tr><th>시스템</th><td><input type="text" id="sys_type"></td>
                <th>버전 *</th><td><input type="text" id="version" placeholder="예: 2.5.1"></td>
            </tr>
            <tr><th>사전 점검 완료</th>
                <td>
                    <label><input type="checkbox" id="pre_check_completed"> 완료</label>
                </td>
                <th>롤백 가능 시점</th>
                <td><input type="date" id="rollback_window_until"></td>
            </tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">검증·증적</h3>
        <table class="ops-form-table">
            <tr><th>검증 결과 *</th><td><textarea id="verification"></textarea></td></tr>
            <tr><th>증적 (URL/파일)</th><td><input type="text" id="verification_evidence" placeholder="첨부파일 ID 또는 외부 링크"></td></tr>
            <tr><th>비고</th><td><textarea id="notes"></textarea></td></tr>
        </table>
    </div>

    <div class="ops-actions">
        <a class="ops-btn" th:href="@{/ops-doc/list}">목록</a>
        <button class="ops-btn ops-btn-primary" onclick="saveInstall()">저장</button>
    </div>
</main>

<script th:inline="javascript">
    const isEdit = /*[[${isEdit}]]*/ false;
    const docId  = /*[[${doc?.docId}]]*/ null;
    function saveInstall() {
        const body = {
            title: document.getElementById('title').value,
            sys_type: document.getElementById('sys_type').value,
            environment: document.getElementById('environment').value,
            section_data: {
                install_date: document.getElementById('install_date').value,
                pre_check_completed: document.getElementById('pre_check_completed').checked,
                version: document.getElementById('version').value,
                rollback_window_until: document.getElementById('rollback_window_until').value,
                verification: document.getElementById('verification').value,
                verification_evidence: document.getElementById('verification_evidence').value,
                notes: document.getElementById('notes').value
            }
        };
        const url = isEdit ? ('/ops-doc/api/install/' + docId) : '/ops-doc/api/install';
        fetch(url, { method: isEdit ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
            .then(r => r.json()).then(d => {
                if (d.success) location.href = '/ops-doc/install/' + d.docId;
                else alert('저장 실패');
            });
    }
</script>
</body>
</html>
