<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장애처리</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" th:href="@{/css/ops-doc.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/top-nav :: nav}"></div>

<main class="ops-page">
    <div class="ops-breadcrumb">
        <a th:href="@{/}">홈</a> &rsaquo; <a th:href="@{/ops-doc/list}">운영·유지보수 문서</a> &rsaquo; 장애처리
    </div>
    <div class="ops-page-header">
        <span class="group-chip">운영문서</span>
        <h1><span class="ops-type-chip ops-type-FAULT">장애</span> 장애처리</h1>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">장애 정보</h3>
        <table class="ops-form-table">
            <tr><th>제목</th><td><input type="text" id="title" th:value="${doc?.title ?: ''}"></td></tr>
            <tr><th>발생일</th><td><input type="date" id="fault_date"></td>
                <th>심각도</th>
                <td>
                    <select id="severity">
                        <option value="">선택</option>
                        <option value="P1">P1 (긴급)</option>
                        <option value="P2">P2 (중요)</option>
                        <option value="P3">P3 (일반)</option>
                    </select>
                </td>
            </tr>
            <tr><th>대상(시도·시군구·시스템) *</th>
                <td colspan="3"><div th:replace="~{fragments/ops-cascade :: cascade}"></div></td></tr>
            <tr><th>장애처리시간</th><td>
                    <span class="ops-time-row">
                        <input type="number" id="downtime_hours" class="ops-time-input" min="0" placeholder="0">
                        <span class="ops-time-unit">시간</span>
                        <input type="number" id="downtime_mins" class="ops-time-input" min="0" max="59" placeholder="0">
                        <span class="ops-time-unit">분</span>
                    </span></td>
                <th>고객영향도</th>
                <td>
                    <select id="customer_impact_level">
                        <option value="">선택</option>
                        <option>HIGH</option><option>MEDIUM</option><option>LOW</option>
                    </select>
                </td>
            </tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">관계자</h3>
        <table class="ops-form-table">
            <tr><th>담당 엔지니어 *</th>
                <td><select id="engineerId"><option value="">선택</option></select></td></tr>
            <tr><th>요청자 *</th>
                <td>
                    <div class="ops-relctl">
                        <div class="ops-seg">
                            <button type="button" id="segPerson" class="active" onclick="setReqKind('PERSON')">공무원</button>
                            <button type="button" id="segStaff" onclick="setReqKind('STAFF')">직원</button>
                            <button type="button" id="segContact" onclick="setReqKind('CONTACT')">업체담당자</button>
                        </div>
                        <input type="text" id="reqSearch" placeholder="이름/기관 검색" oninput="reqSearchInput()" autocomplete="off">
                        <ul class="ops-search-results" id="reqResults"></ul>
                        <div id="reqSelectedBox"></div>
                        <span class="ops-inline-add" onclick="toggleReqForm()"><i class="fas fa-plus"></i> 신규 등록</span>
                        <div class="ops-inline-form" id="reqForm">
                            <input type="text" id="rfName" placeholder="이름 *">
                            <input type="text" id="rfOrg" placeholder="기관">
                            <input type="text" id="rfDept" placeholder="부서">
                            <input type="text" id="rfPos" placeholder="직급">
                            <input type="text" id="rfTel" placeholder="연락처">
                            <button type="button" class="ops-btn ops-btn-primary" onclick="saveRequester()">등록</button>
                        </div>
                    </div>
                </td></tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">증상·원인·조치</h3>
        <div class="ops-reco-bar">
            <button type="button" class="ops-reco-toggle" onclick="opsKbToggle()">
                <i class="fas fa-lightbulb"></i> KB 추천 보기/접기 (증상 입력 시 자동 갱신)</button>
            <div class="ops-reco-box" id="kbRecoBox"></div>
        </div>
        <table class="ops-form-table">
            <tr><th>증상 *</th><td><textarea id="symptom"></textarea></td></tr>
            <tr><th>원인</th><td><textarea id="cause"></textarea></td></tr>
            <tr><th>조치 *</th><td><textarea id="action"></textarea></td></tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">협력업체</h3>
        <div class="ops-relctl">
            <input type="text" id="partnerSearch" placeholder="협력업체 검색 (외부업체 관리에 등록된 업체)" oninput="opsPartnerSearchInput()" autocomplete="off">
            <ul class="ops-search-results" id="partnerResults"></ul>
            <div id="partnerChips" class="ops-partner-chips"></div>
        </div>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">첨부파일</h3>
        <div class="ops-attachment-area">
            <input type="file" id="attachFile" multiple>
            <div id="attachList"></div>
        </div>
    </div>

    <div class="ops-actions">
        <a class="ops-btn" th:href="@{/ops-doc/list}">목록</a>
        <button th:if="${mode != 'view' and canEdit}" class="ops-btn ops-btn-primary" onclick="saveFault()">저장</button>
        <a th:if="${mode == 'view' and canEdit}" class="ops-btn ops-btn-primary"
           th:href="@{'/ops-doc/fault/' + ${doc.docId} + '/edit'}"><i class="fas fa-pen"></i> 수정</a>
        <button th:if="${mode == 'view' and canEdit}" class="ops-btn ops-btn-danger" onclick="deleteDoc()">
            <i class="fas fa-trash"></i> 삭제</button>
        <span th:if="${mode == 'view' and canEditBase and !canEdit}" style="font-size:0.8rem;color:var(--muted);align-self:center;">작성자 본인 또는 관리자만 수정·삭제할 수 있습니다.</span>
    </div>
</main>

<script src="/js/ops-doc-relations.js"></script>
<script src="/js/ops-doc-cascade.js"></script>
<script th:inline="javascript">
    const isEdit = /*[[${isEdit}]]*/ false;
    const docId  = /*[[${doc?.docId}]]*/ null;
    const OPS_MODE = /*[[${mode}]]*/ 'new';            // new | edit | view
    const OPS_SECTION = /*[[${sectionData}]]*/ {};     // 저장된 section_data
    window.OPS_IS_EDIT = isEdit;
    window.OPS_DOC_ID = docId;
    function applyFaultReco(k) {
        if (k.cause) document.getElementById('cause').value = k.cause;
        if (k.action) document.getElementById('action').value = k.action;
        if (k.symptom && !document.getElementById('symptom').value) document.getElementById('symptom').value = k.symptom;
    }
    function opsSetVal(id, v) { var el = document.getElementById(id); if (el && v != null && v !== '') el.value = v; }
    function prefillFault() {
        var s = OPS_SECTION || {};
        opsSetVal('fault_date', s.fault_date);
        opsSetVal('severity', s.severity);
        opsSetVal('customer_impact_level', s.customer_impact_level);
        opsSetVal('symptom', s.symptom);
        opsSetVal('cause', s.cause);
        opsSetVal('action', s.action);
        if (s.downtime_minutes != null && s.downtime_minutes !== '') {
            var mm = parseInt(s.downtime_minutes, 10) || 0;
            opsSetVal('downtime_hours', Math.floor(mm / 60));
            opsSetVal('downtime_mins', mm % 60);
        }
    }
    function opsApplyViewMode() {
        if (OPS_MODE !== 'view') return;
        document.querySelectorAll('.ops-form-table input, .ops-form-table select, .ops-form-table textarea')
            .forEach(function (el) { el.disabled = true; });
        var af = document.getElementById('attachFile'); if (af) af.disabled = true;
        ['reqSearch', 'reqResults', 'partnerSearch', 'partnerResults', 'reqForm'].forEach(function (id) {
            var el = document.getElementById(id); if (el) el.style.display = 'none';
        });
        document.querySelectorAll('.ops-inline-add, .ops-reco-bar, .ops-seg')
            .forEach(function (el) { el.style.display = 'none'; });
    }
    function deleteDoc() {
        if (!confirm('이 문서를 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
        fetch('/ops-doc/api/' + docId, { method: 'DELETE', credentials: 'same-origin' })
            .then(function (r) { return r.json().catch(function () { return {}; }).then(function (d) { return { r: r, d: d }; }); })
            .then(function (x) {
                if (x.r.ok && x.d.success) { location.href = '/ops-doc/list'; return; }
                alert((x.d.error && x.d.error.message) || x.d.message || ('삭제 실패 (HTTP ' + x.r.status + ')'));
            }).catch(function (e) { alert('오류: ' + e); });
    }
    document.addEventListener('DOMContentLoaded', function () {
        prefillFault();
        if (OPS_MODE !== 'view') opsKbSetup('FAULT', 'symptom', 'sys_type', applyFaultReco);  // 증상 입력 시 실시간 추천
        opsApplyViewMode();
    });
    function saveFault() {
        if (!opsValidateRelations()) return;
        const rel = opsRelationsBody();
        const downtimeMinutes = opsReadTimeMinutes('downtime_hours', 'downtime_mins');
        if (downtimeMinutes === null) return;  // 입력값 검증 실패 → 저장 중단
        const body = {
            title: document.getElementById('title').value,
            sys_type: document.getElementById('sys_type').value,
            region_code: document.getElementById('region_code').value,
            engineer_id: rel.engineer_id,
            requester_kind: rel.requester_kind,
            requester_id: rel.requester_id,
            partners: opsPartnersBody(),
            section_data: {
                fault_date: document.getElementById('fault_date').value,
                severity: document.getElementById('severity').value,
                downtime_minutes: downtimeMinutes,
                customer_impact_level: document.getElementById('customer_impact_level').value,
                symptom: document.getElementById('symptom').value,
                cause: document.getElementById('cause').value,
                action: document.getElementById('action').value
            }
        };
        const url = isEdit ? ('/ops-doc/api/fault/' + docId) : '/ops-doc/api/fault';
        const method = isEdit ? 'PUT' : 'POST';
        fetch(url, { method, headers: {'Content-Type':'application/json'},
            credentials: 'same-origin', body: JSON.stringify(body) })
            .then(function (r) { return r.json().catch(function () { return {}; }).then(function (d) { return { r: r, d: d }; }); })
            .then(function (x) {
                var r = x.r, d = x.d;
                if (r.ok && d.success) { location.href = '/ops-doc/fault/' + d.docId; return; }
                alert((d.error && d.error.message) || d.message || ('저장 실패 (HTTP ' + r.status + ')'));
            }).catch(function (e) { alert('오류: ' + e); });
    }
</script>
</body>
</html>
