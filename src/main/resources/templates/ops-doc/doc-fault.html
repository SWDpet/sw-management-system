<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장애처리</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" th:href="@{/css/ops-doc.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/top-nav :: nav}"></div>

<main class="ops-page">
    <div class="ops-breadcrumb">
        <a th:href="@{/}">홈</a> &rsaquo; <a th:href="@{/ops-doc/list}">운영·유지보수 문서</a> &rsaquo; 장애처리
    </div>
    <div class="ops-page-header">
        <span class="group-chip">운영문서</span>
        <h1><span class="ops-type-chip ops-type-FAULT">장애</span> 장애처리</h1>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">장애 정보</h3>
        <table class="ops-form-table">
            <tr><th>제목</th><td><input type="text" id="title" th:value="${doc?.title ?: ''}"></td></tr>
            <tr><th>발생일</th><td><input type="date" id="fault_date"></td>
                <th>심각도</th>
                <td>
                    <select id="severity">
                        <option value="">선택</option>
                        <option value="P1">P1 (긴급)</option>
                        <option value="P2">P2 (중요)</option>
                        <option value="P3">P3 (일반)</option>
                    </select>
                </td>
            </tr>
            <tr><th>지역코드 *</th><td><input type="text" id="region_code" placeholder="예: 11000"></td>
                <th>시스템 *</th><td><input type="text" id="sys_type" placeholder="UPIS / KRAS / IPSS / GIS_SW / APIMS / ETC"></td>
            </tr>
            <tr><th>장애시간(분)</th><td><input type="number" id="downtime_minutes" min="0"></td>
                <th>고객영향도</th>
                <td>
                    <select id="customer_impact_level">
                        <option value="">선택</option>
                        <option>HIGH</option><option>MEDIUM</option><option>LOW</option>
                    </select>
                </td>
            </tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">관계자</h3>
        <table class="ops-form-table">
            <tr><th>담당 엔지니어 *</th>
                <td><select id="engineerId"><option value="">선택</option></select></td></tr>
            <tr><th>요청자 *</th>
                <td>
                    <div class="ops-relctl">
                        <div class="ops-seg">
                            <button type="button" id="segPerson" class="active" onclick="setReqKind('PERSON')">공무원</button>
                            <button type="button" id="segContact" onclick="setReqKind('CONTACT')">업체담당자</button>
                        </div>
                        <input type="text" id="reqSearch" placeholder="이름/기관 검색" oninput="reqSearchInput()" autocomplete="off">
                        <ul class="ops-search-results" id="reqResults"></ul>
                        <div id="reqSelectedBox"></div>
                        <span class="ops-inline-add" onclick="toggleReqForm()"><i class="fas fa-plus"></i> 신규 등록</span>
                        <div class="ops-inline-form" id="reqForm">
                            <input type="text" id="rfName" placeholder="이름 *">
                            <input type="text" id="rfOrg" placeholder="기관">
                            <input type="text" id="rfDept" placeholder="부서">
                            <input type="text" id="rfPos" placeholder="직급">
                            <input type="text" id="rfTel" placeholder="연락처">
                            <button type="button" class="ops-btn ops-btn-primary" onclick="saveRequester()">등록</button>
                        </div>
                    </div>
                </td></tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">증상·원인·조치</h3>
        <table class="ops-form-table">
            <tr><th>증상 *</th><td><textarea id="symptom"></textarea></td></tr>
            <tr><th>원인</th><td><textarea id="cause"></textarea></td></tr>
            <tr><th>조치 *</th><td><textarea id="action"></textarea></td></tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">첨부파일</h3>
        <div class="ops-attachment-area">
            <input type="file" id="attachFile" multiple>
            <div id="attachList"></div>
        </div>
    </div>

    <div class="ops-actions">
        <a class="ops-btn" th:href="@{/ops-doc/list}">목록</a>
        <button class="ops-btn ops-btn-primary" onclick="saveFault()">저장</button>
    </div>
</main>

<script src="/js/ops-doc-relations.js"></script>
<script th:inline="javascript">
    const isEdit = /*[[${isEdit}]]*/ false;
    const docId  = /*[[${doc?.docId}]]*/ null;
    window.OPS_IS_EDIT = isEdit;
    window.OPS_DOC_ID = docId;
    function saveFault() {
        if (!opsValidateRelations()) return;
        const rel = opsRelationsBody();
        const body = {
            title: document.getElementById('title').value,
            sys_type: document.getElementById('sys_type').value,
            region_code: document.getElementById('region_code').value,
            engineer_id: rel.engineer_id,
            requester_kind: rel.requester_kind,
            requester_id: rel.requester_id,
            section_data: {
                fault_date: document.getElementById('fault_date').value,
                severity: document.getElementById('severity').value,
                downtime_minutes: document.getElementById('downtime_minutes').value,
                customer_impact_level: document.getElementById('customer_impact_level').value,
                symptom: document.getElementById('symptom').value,
                cause: document.getElementById('cause').value,
                action: document.getElementById('action').value
            }
        };
        const url = isEdit ? ('/ops-doc/api/fault/' + docId) : '/ops-doc/api/fault';
        const method = isEdit ? 'PUT' : 'POST';
        fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
            .then(r => r.json())
            .then(d => {
                if (d.success) location.href = '/ops-doc/fault/' + d.docId;
                else alert((d.error && d.error.message) || '저장 실패');
            }).catch(e => alert('오류: ' + e));
    }
</script>
</body>
</html>
