<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>업무지원</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" th:href="@{/css/ops-doc.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/top-nav :: nav}"></div>

<main class="ops-page">
    <div class="ops-breadcrumb">
        <a th:href="@{/}">홈</a> &rsaquo; <a th:href="@{/ops-doc/list}">운영·유지보수 문서</a> &rsaquo; 업무지원
    </div>
    <div class="ops-page-header">
        <span class="group-chip">운영문서</span>
        <h1><span class="ops-type-chip ops-type-SUPPORT">지원</span> 업무지원</h1>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">지원 정보</h3>
        <table class="ops-form-table">
            <tr><th>제목</th><td><input type="text" id="title"></td></tr>
            <tr><th>요청일</th><td><input type="date" id="request_date"></td>
                <th>요청채널</th>
                <td>
                    <select id="request_channel">
                        <option value="">선택</option>
                        <option value="PHONE">전화</option>
                        <option value="EMAIL">이메일</option>
                        <option value="ONSITE">현장</option>
                    </select>
                </td>
            </tr>
            <tr><th>지역코드 *</th><td><input type="text" id="region_code"></td>
                <th>시스템 *</th><td><input type="text" id="sys_type"></td>
            </tr>
            <tr><th>투입 시간(h)</th><td><input type="number" id="man_hour" step="0.5" min="0"></td>
                <th></th><td></td>
            </tr>
            <tr><th>지원 대상</th>
                <td>
                    <select id="support_target_type">
                        <option value="">선택</option>
                        <option value="EXTERNAL">지자체</option>
                        <option value="INTERNAL">자사 조직</option>
                    </select>
                </td>
                <th>만족도</th>
                <td>
                    <select id="satisfaction_score">
                        <option value="">선택</option>
                        <option>5 매우만족</option><option>4 만족</option><option>3 보통</option><option>2 불만</option><option>1 매우불만</option>
                    </select>
                </td>
            </tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">관계자</h3>
        <table class="ops-form-table">
            <tr><th>담당 엔지니어 *</th>
                <td><select id="engineerId"><option value="">선택</option></select></td></tr>
            <tr><th>요청자 *</th>
                <td>
                    <div class="ops-relctl">
                        <div class="ops-seg">
                            <button type="button" id="segPerson" class="active" onclick="setReqKind('PERSON')">공무원</button>
                            <button type="button" id="segContact" onclick="setReqKind('CONTACT')">업체담당자</button>
                        </div>
                        <input type="text" id="reqSearch" placeholder="이름/기관 검색" oninput="reqSearchInput()" autocomplete="off">
                        <ul class="ops-search-results" id="reqResults"></ul>
                        <div id="reqSelectedBox"></div>
                        <span class="ops-inline-add" onclick="toggleReqForm()"><i class="fas fa-plus"></i> 신규 등록</span>
                        <div class="ops-inline-form" id="reqForm">
                            <input type="text" id="rfName" placeholder="이름 *">
                            <input type="text" id="rfOrg" placeholder="기관">
                            <input type="text" id="rfDept" placeholder="부서">
                            <input type="text" id="rfPos" placeholder="직급">
                            <input type="text" id="rfTel" placeholder="연락처">
                            <button type="button" class="ops-btn ops-btn-primary" onclick="saveRequester()">등록</button>
                        </div>
                    </div>
                </td></tr>
        </table>
    </div>

    <div class="ops-section">
        <h3 class="ops-section-title">지원 내용</h3>
        <table class="ops-form-table">
            <tr><th>지원 내용 *</th><td><textarea id="support_content"></textarea></td></tr>
            <tr><th>비고</th><td><textarea id="notes"></textarea></td></tr>
        </table>
    </div>

    <div class="ops-actions">
        <a class="ops-btn" th:href="@{/ops-doc/list}">목록</a>
        <button class="ops-btn ops-btn-primary" onclick="saveSupport()">저장</button>
    </div>
</main>

<script src="/js/ops-doc-relations.js"></script>
<script th:inline="javascript">
    const isEdit = /*[[${isEdit}]]*/ false;
    const docId  = /*[[${doc?.docId}]]*/ null;
    window.OPS_IS_EDIT = isEdit;
    window.OPS_DOC_ID = docId;
    function saveSupport() {
        if (!opsValidateRelations()) return;
        const rel = opsRelationsBody();
        const body = {
            title: document.getElementById('title').value,
            sys_type: document.getElementById('sys_type').value,
            region_code: document.getElementById('region_code').value,
            support_target_type: document.getElementById('support_target_type').value,
            engineer_id: rel.engineer_id,
            requester_kind: rel.requester_kind,
            requester_id: rel.requester_id,
            section_data: {
                request_date: document.getElementById('request_date').value,
                request_channel: document.getElementById('request_channel').value,
                requester: opsSelectedReq.label,
                man_hour: document.getElementById('man_hour').value,
                satisfaction_score: document.getElementById('satisfaction_score').value,
                support_content: document.getElementById('support_content').value,
                notes: document.getElementById('notes').value
            }
        };
        const url = isEdit ? ('/ops-doc/api/support/' + docId) : '/ops-doc/api/support';
        fetch(url, { method: isEdit ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
            .then(r => r.json()).then(d => {
                if (d.success) location.href = '/ops-doc/support/' + d.docId;
                else alert((d.error && d.error.message) || '저장 실패');
            });
    }
</script>
</body>
</html>
