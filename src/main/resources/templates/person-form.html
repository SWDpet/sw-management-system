<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>담당자 정보 관리</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --dark-navy: #1a237e;
            --bg-color: #f4f7f6;
            --card-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 40px 20px; color: #444;
        }

        .admin-container {
            max-width: 900px; margin: 0 auto;
            background: white; border-radius: 12px;
            box-shadow: var(--card-shadow); overflow: hidden;
        }

        .page-header {
            background: var(--dark-navy); color: white;
            padding: 25px 30px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .page-header h2 { margin: 0; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }

        .header-btns { display: flex; gap: 10px; }
        .btn-top {
            background: rgba(255, 255, 255, 0.15); color: white;
            padding: 8px 16px; border-radius: 6px; text-decoration: none;
            font-size: 0.85rem; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex; align-items: center; gap: 5px;
        }
        .btn-top:hover { background: white; color: var(--dark-navy); }

        form { padding: 40px; }
        
        fieldset {
            border: 1px solid #e3e6f0; border-radius: 8px;
            padding: 25px; margin-bottom: 30px; background: #fcfdff;
        }
        legend {
            font-weight: 700; color: var(--primary-color);
            padding: 0 10px; font-size: 1.1rem;
        }

        .form-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; min-width: 220px; display: flex; flex-direction: column; }
        
        label { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #555; }
        
        input, select {
            width: 100%; padding: 12px; border: 1px solid #d1d3e2;
            border-radius: 6px; font-size: 0.95rem; outline: none; transition: 0.2s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.1); }
        
        input[readonly] { background-color: #eaecf4; color: #6e707e; font-weight: 600; cursor: not-allowed; }

        .page-footer {
            padding: 25px 30px; background: #f8f9fc;
            border-top: 1px solid #e3e6f0; display: flex;
            justify-content: center; gap: 20px;
        }
        .btn-save { background: #1cc88a; color: white; border: none; padding: 15px 60px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1.1rem; }
        .btn-cancel { background: var(--secondary-color); color: white; padding: 15px 60px; border-radius: 6px; font-weight: 700; text-decoration: none; font-size: 1.1rem; text-align: center; }
        .btn-delete { background: #e74a3b; color: white; border: none; padding: 15px 40px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="page-header">
            <h2><i class="fas fa-user-edit"></i> 담당자 정보 관리</h2>
            <div class="header-btns">
                <a th:href="@{/}" class="btn-top"><i class="fas fa-home"></i> 메인으로</a>
                <a th:href="@{/person/list}" class="btn-top"><i class="fas fa-list"></i> 목록으로</a>
                <a href="/logout" class="btn-top" style="background:#e74a3b; color:white;"><i class="fas fa-sign-out-alt"></i> 로그아웃</a>
            </div>
        </div>

        <form id="personForm" th:action="@{/person/save}" th:object="${person}" method="post" onsubmit="savePerson(event)">
            
            <input type="hidden" th:field="*{id}">

            <fieldset>
                <legend><i class="fas fa-user"></i> 기본 인적 사항</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label>성명 (Name)</label>
                        <input type="text" th:field="*{userNm}" required placeholder="담당자 성명">
                    </div>
                    <div class="form-group">
                        <label>직급 (Rank)</label>
                        <input type="text" name="pos" th:value="${person.pos}" placeholder="예: 주무관">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>소속 기관 (Org Name)</label>
                        <input type="text" th:field="*{orgNm}" placeholder="예: 울산광역시청">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>부서명 (Dept)</label>
                        <input type="text" th:field="*{deptNm}" placeholder="예: 정보통신과">
                    </div>
                    <div class="form-group">
                        <label>팀명 (Team)</label>
                        <input type="text" th:field="*{teamNm}" placeholder="예: 공간정보팀">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>연락처 (Tel)</label>
                        <input type="text" th:field="*{tel}" placeholder="010-0000-0000">
                    </div>
                    <div class="form-group">
                        <label>이메일 (Email)</label>
                        <input type="email" th:field="*{email}" placeholder="example@korea.kr">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend><i class="fas fa-map-marker-alt"></i> 지역 및 시스템 정보</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label>시도광역시 (City)</label>
                        <select id="sidoSelect" name="cityNm" onchange="filterSigungu()">
                            <option value="">:: 시도 선택 ::</option>
                            <option th:each="sido : ${sidoList}" 
                                    th:value="${sido}" 
                                    th:text="${sido}" 
                                    th:selected="${sido == person.cityNm}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>시군구 (District)</label>
                        <select id="sigunguSelect" name="distNm" onchange="updateLocationCodes()">
                            <option value="">:: 시군구 선택 ::</option>
                        </select>
                        <input type="hidden" id="savedDistNm" th:value="${person.distNm}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>행정구역코드 (Dist Code)</label>
                        <input type="text" id="distCd" name="distCd" th:field="*{distCd}" readonly placeholder="자동 입력">
                    </div>
                    <div class="form-group">
                        <label>기관 코드 (Org Code)</label>
                        <input type="text" id="orgCd" name="orgCd" th:field="*{orgCd}" readonly placeholder="자동 입력">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>시스템명 (System)</label>
                        <select id="sysMstSelect" name="sysNm" onchange="updateSysEn()">
                            <option value="">:: 시스템 선택 ::</option>
                            <option th:each="sys : ${sysMstList}" 
                                    th:value="${sys.nm}" 
                                    th:text="${sys.nm}" 
                                    th:data-cd="${sys.cd}"
                                    th:selected="${sys.nm == person.sysNm}"></option>
                        </select>
                        <input type="hidden" id="savedSysNm" th:value="${person.sysNm}">
                    </div>
                    <div class="form-group">
                        <label>시스템 영문명 (System EN)</label>
                        <input type="text" id="sysNmEn" name="sysNmEn" th:field="*{sysNmEn}" readonly placeholder="자동 입력">
                    </div>
                </div>
            </fieldset>

            <div class="page-footer">
                <button type="submit" class="btn-save">저장</button>
                <a th:href="@{/person/list}" class="btn-cancel">취소</a>
                <button type="button" class="btn-delete" 
                        th:if="${person.id != null}" 
                        th:onclick="'deletePerson(' + ${person.id} + ')'">삭제</button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        window.onload = function() {
            // 수정 모드(ID 존재) 또는 기존 데이터가 있을 때 초기화 실행
            var savedDistNm = document.getElementById("savedDistNm").value;
            if (savedDistNm || document.getElementById("sidoSelect").value) {
                filterSigungu();
            }
            sortSysMstOptions();
        };

        // [시군구 로드] 데이터 매핑 강화
        function filterSigungu() {
            var sido = document.getElementById("sidoSelect").value;
            var sigunguSelect = document.getElementById("sigunguSelect");
            var savedDistNm = document.getElementById("savedDistNm").value;

            if (!sido) {
                sigunguSelect.innerHTML = '<option value="">:: 시군구 선택 ::</option>';
                updateLocationCodes();
                return;
            }

            fetch('/person/api/sigungu?sido=' + encodeURIComponent(sido))
                .then(response => {
                    if (!response.ok) throw new Error("서버 응답 오류");
                    return response.json();
                })
                .then(data => {
                    var html = '<option value="">:: 시군구 선택 ::</option>';
                    var isAnySelected = false;

                    data.forEach(function(item) {
                        // 필드명 방어 로직 (sggNm/sigunguNm, admSectC/sigunguCd 등)
                        var nm = item.sggNm || item.sigunguNm || item.nm || '';
                        var distCode = item.admSectC || item.sigunguCd || item.distCd || '';
                        var orgCode = item.insttC || item.orgCd || item.insttCode || '';

                        var selected = (nm === savedDistNm) ? 'selected' : '';
                        if (selected) isAnySelected = true;

                        html += `<option value="${nm}" 
                                         data-dist-cd="${distCode}" 
                                         data-org-cd="${orgCode}" 
                                         ${selected}>${nm}</option>`;
                    });
                    
                    sigunguSelect.innerHTML = html;
                    
                    // 기존 선택값이 있다면 코드 자동 입력 실행
                    if (isAnySelected) {
                        updateLocationCodes();
                    } else {
                        // 시도 변경 등으로 선택값이 날아갔으면 하위 코드 초기화
                        document.getElementById("distCd").value = "";
                        document.getElementById("orgCd").value = "";
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        // [코드 자동 입력] 행정구역코드 + 기관코드
        function updateLocationCodes() {
            var select = document.getElementById("sigunguSelect");
            var selectedOption = select.options[select.selectedIndex];
            
            if (selectedOption && selectedOption.value !== "") {
                // dataset 속성값 가져오기
                var distCd = selectedOption.getAttribute('data-dist-cd');
                var orgCd = selectedOption.getAttribute('data-org-cd');

                document.getElementById("distCd").value = distCd ? distCd : "";
                document.getElementById("orgCd").value = orgCd ? orgCd : "";
            } else {
                document.getElementById("distCd").value = "";
                document.getElementById("orgCd").value = "";
            }
        }

        // [시스템 영문명 자동 입력]
        function updateSysEn() {
            var select = document.getElementById("sysMstSelect");
            var selectedOption = select.options[select.selectedIndex];
            
            if (selectedOption && selectedOption.dataset.cd) {
                document.getElementById("sysNmEn").value = selectedOption.dataset.cd;
            } else {
                if (select.value === "") {
                    document.getElementById("sysNmEn").value = "";
                }
            }
        }

        // [AJAX 저장]
        async function savePerson(event) {
            event.preventDefault(); 
            const form = event.target;
            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData
                });
                const resultText = await response.text();

                if (response.ok) {
                    alert("저장되었습니다.");
                    window.location.href = "/person/list";
                } else {
                    alert("저장에 실패하였습니다.\n\n[원인]\n" + resultText);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("서버 통신 중 오류가 발생했습니다.");
            }
        }

        // [시스템 목록 정렬 및 초기값 세팅]
        function sortSysMstOptions() {
            const select = document.getElementById("sysMstSelect");
            if (!select) return;
            
            const options = Array.from(select.options);
            if (options.length <= 1) return;
            
            const defaultOption = options[0];
            const dataOptions = options.slice(1);
            
            // 가나다순 정렬
            dataOptions.sort((a, b) => a.text.localeCompare(b.text, 'ko'));
            
            select.innerHTML = '';
            select.appendChild(defaultOption);
            dataOptions.forEach(opt => select.appendChild(opt));
            
            // [오류 수정 핵심] Thymeleaf 직접 주입 대신 hidden input 값 사용
            const currentVal = document.getElementById("savedSysNm").value;
            
            if(currentVal) {
                select.value = currentVal;
                // 값 재설정 후 영문명도 업데이트
                updateSysEn();
            }
        }

        function deletePerson(id) {
            if(confirm("정말로 이 담당자 정보를 삭제하시겠습니까?")) {
                var form = document.createElement("form");
                form.setAttribute("method", "post");
                form.setAttribute("action", "/person/delete/" + id);
                document.body.appendChild(form);
                form.submit();
            }
        }

        // [추가] 키보드 단축키 및 엔터 방지 이벤트 리스너
        document.addEventListener("keydown", function(event) {
            // 1. Enter 키 입력 시 저장 방지 (Textarea, Button, Submit 제외)
            if (event.key === "Enter") {
                if (event.target.tagName !== "TEXTAREA" && event.target.tagName !== "BUTTON" && event.target.type !== "submit") {
                    event.preventDefault();
                }
            }

            // 2. Insert 키 입력 시 (수정 준비 - 첫 번째 입력 필드로 포커스)
            if (event.key === "Insert") {
                event.preventDefault();
                // userNm(성명) 필드로 포커스 이동
                const firstInput = document.querySelector('input[name="userNm"]');
                if (firstInput) {
                    firstInput.focus();
                }
            }

            // 3. End 키 입력 시 '저장' 버튼 클릭
            if (event.key === "End") {
                event.preventDefault();
                const saveBtn = document.querySelector('.btn-save');
                if (saveBtn) {
                    saveBtn.click();
                }
            }
        });
    </script>

</body>
</html>
