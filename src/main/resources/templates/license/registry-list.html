<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라이선스 대장 - SW 관리 시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary:#0F766E; --primary2:#115E59; --primary-lt:#F0FDFA;
            --bg:#FAFAF9; --surface:#FFFFFF;
            --border:#E7E5E4; --border2:#D6D3D1;
            --text:#1C1917; --text2:#57534E; --muted:#A8A29E;
        }
        body { font-family: 'Inter','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); }

        .container { max-width: 1700px; margin: 0 auto; padding: 28px 32px 56px; }

        /* 라이트 페이지 헤더 */
        .page-header {
            padding: 0 0 22px; margin-bottom: 22px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .page-header h2 {
            margin: 0; font-size: 1.35rem; font-weight: 700; color: var(--text);
            display: flex; align-items: center; gap: 10px;
        }
        .page-header h2 i { color: var(--primary); font-size: 1.1rem; }
        .page-header .sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; font-weight: 500; }
        .page-header-left { display: flex; flex-direction: column; gap: 4px; }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .upload-date { font-size: 0.78rem; color: var(--text2); font-weight: 500; display: inline-flex; align-items: center; gap: 5px; padding-right: 8px; }
        .upload-date i { color: var(--primary); }

        /* Ghost 버튼 (공용 톤) */
        .btn-top {
            background: transparent; color: var(--text2);
            padding: 7px 14px; border-radius: 8px; text-decoration: none;
            font-size: 0.83rem; font-weight: 600; transition: all 0.15s;
            border: 1px solid var(--border);
            display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
            font-family: inherit;
        }
        .btn-top:hover { background: #F5F5F4; border-color: var(--border2); color: var(--text); }
        .btn-top.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-top.btn-primary:hover { background: var(--primary2); border-color: var(--primary2); color: #fff; }
        .btn-top.btn-subtle { background: var(--primary-lt); border-color: #99F6E4; color: var(--primary); }
        .btn-top.btn-subtle:hover { background: #CCFBF1; color: var(--primary2); }

        /* 검색 영역 */
        .search-area { display: flex; gap: 10px; align-items: center; margin-top: 6px; }
        .search-input {
            padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
            width: 320px; font-size: 0.88rem; font-family: inherit;
            background: var(--surface); color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,118,110,0.12); }

        .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 0.85rem; }
        .alert-success { background: #F0FDF4; border: 1px solid #86EFAC; color: #166534; }
        .alert-danger  { background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C; }

        /* 필터 (제품별 카운트) */
        .filter-section {
            background: var(--surface); padding: 18px; border-radius: 12px;
            margin-bottom: 18px; border: 1px solid var(--border);
        }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
        .filter-btn {
            padding: 12px 10px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--surface); cursor: pointer; text-align: center;
            transition: all 0.15s; text-decoration: none; color: var(--text); display: block;
        }
        .filter-btn:hover { background: var(--primary-lt); border-color: #99F6E4; color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(15,118,110,0.2); }
        .filter-count { display: block; font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; font-family: 'Inter',sans-serif; font-variant-numeric: tabular-nums; }
        .filter-label { display: block; font-size: 0.72rem; opacity: 0.85; }

        /* 테이블 섹션 */
        .table-section {
            background: var(--surface); padding: 20px 22px; border-radius: 12px;
            border: 1px solid var(--border);
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
        .table-header h2 { font-size: 1rem; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .table-header h2 .count { color: var(--muted); font-weight: 500; font-size: 0.85em; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td {
            padding: 12px 10px; text-align: left; border-bottom: 1px solid #F5F5F4;
            font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: 'Inter','Noto Sans KR',sans-serif;
        }
        thead th {
            background: var(--surface); color: var(--muted); font-weight: 600;
            font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
            border-bottom: 1px solid var(--border); position: sticky; top: 0;
            padding: 14px 10px;
        }
        tbody tr { transition: background 0.12s, box-shadow 0.12s; }
        tbody tr:hover { background: #FAFAF9; box-shadow: inset 3px 0 0 0 var(--primary); }
        td[title]:hover { background: #F5F5F4; position: relative; }

        /* 컬럼 너비 */
        th:nth-child(1), td:nth-child(1) { width: 10%; }
        th:nth-child(2), td:nth-child(2) { width: 8%; }
        th:nth-child(3), td:nth-child(3) { width: 10%; }
        th:nth-child(4), td:nth-child(4) { width: 10%; }
        th:nth-child(5), td:nth-child(5) { width: 12%; }
        th:nth-child(6), td:nth-child(6) { width: 8%; }
        th:nth-child(7), td:nth-child(7) { width: 9%; }
        th:nth-child(8), td:nth-child(8) { width: 9%; }
        th:nth-child(9), td:nth-child(9) { width: 9%; }
        th:nth-child(10), td:nth-child(10) { width: 15%; }

        .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .badge-success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
        .badge-warning { background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; }
        .badge-danger  { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }

        /* 액션 버튼 (작은 고스트) */
        .btn { padding: 6px 12px; border-radius: 6px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; font-size: 0.78rem; border: 1px solid var(--border); cursor: pointer; font-family: inherit; background: var(--surface); color: var(--text2); font-weight: 600; transition: all 0.15s; }
        .btn:hover { background: #F5F5F4; color: var(--text); border-color: var(--border2); }
        .btn-primary { background: transparent; color: var(--primary); border-color: #99F6E4; }
        .btn-primary:hover { background: var(--primary-lt); color: var(--primary2); border-color: #5EEAD4; }
        .btn-success { background: transparent; color: #059669; border-color: #BBF7D0; }
        .btn-success:hover { background: #F0FDF4; color: #047857; border-color: #86EFAC; }
        .btn-sm { padding: 4px 10px; font-size: 0.72rem; }

        /* 외국인 정렬 토글 (subtle) */
        .btn-sort { background: transparent; color: var(--text2); border: 1px solid var(--border); padding: 7px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .btn-sort:hover { background: #F5F5F4; color: var(--text); border-color: var(--border2); }
        .btn-sort.active { background: var(--primary-lt); color: var(--primary2); border-color: #99F6E4; }

        /* 링크 (License ID) */
        .lic-id-link { color: var(--primary); text-decoration: none; font-weight: 700; transition: color 0.12s; }
        .lic-id-link:hover { color: var(--primary2); text-decoration: underline; }

        .no-data { text-align: center; padding: 72px 24px; color: var(--muted); }
        .no-data .empty-ico { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 16px; background: #F5F5F4; color: var(--muted); display: inline-flex; align-items: center; justify-content: center; font-size: 1.8rem; }

        /* 버튼 press 피드백 */
        .btn:active, .btn-top:active, .btn-sort:active, .filter-btn:active { transform: scale(0.97); transition: transform 0.08s; }

        .actions { white-space: nowrap; }
    </style>
</head>
<body>
    <!-- 공용 GNB -->
    <div th:replace="~{fragments/top-nav :: nav}"></div>

    <div class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h2><i class="fas fa-clipboard-list"></i> 라이선스 대장</h2>
                <span class="sub">License Manager에서 발급된 라이선스 현황</span>
            </div>
            <div class="header-actions">
                <span class="upload-date" th:if="${latestUploadDate != null}">
                    <i class="fas fa-calendar-days"></i> 기준: <span th:text="${#temporals.format(latestUploadDate, 'yyyy-MM-dd HH:mm')}"></span>
                </span>
                <a th:href="@{/geonuris/license/list}" class="btn-top"><i class="fas fa-key"></i> GeoNURIS</a>
                <a th:href="@{/qr-license/issue}" class="btn-top"><i class="fas fa-qrcode"></i> QR발급</a>
                <a th:href="@{/qr-license/ledger}" class="btn-top"><i class="fas fa-list"></i> QR대장</a>
            </div>
        </div>

        <!-- 검색 영역 -->
        <div class="search-area" style="margin-bottom: 18px;">
            <input type="text" id="searchInput" class="search-input"
                   placeholder="License ID, 제품명, 등록자, 회사명 검색"
                   onkeyup="searchTable()">
            <select id="productFilter" class="search-input" style="width: 220px;" onchange="filterByProduct()">
                <option value="">전체 제품</option>
                <option th:each="entry : ${productStats}"
                        th:value="${entry.key}"
                        th:text="${entry.key} + ' (' + ${entry.value} + ')'"
                        th:selected="${selectedProductId == entry.key}"></option>
            </select>
        </div>
        
        <!-- 업로드 성공 메시지 -->
        <div th:if="${uploadMessage != null}" class="alert" style="background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
            <span th:text="${uploadMessage}"></span>
        </div>
        
        <!-- 일반 성공 메시지 -->
        <div th:if="${success != null and success and message != null}" class="alert" style="background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
            ✅ <span th:text="${message}"></span>
        </div>
        
        <!-- 에러 메시지 -->
        <div th:if="${error != null and error and message != null}" class="alert" style="background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
            ❌ <span th:text="${message}"></span>
        </div>
        
        <!-- 제품별 필터 -->
        <div class="filter-section" th:if="${productStats != null && !productStats.isEmpty()}">
            <div class="filter-grid">
                <!-- 전체 버튼 -->
                <a th:href="@{/license/registry/list}"
                   class="filter-btn"
                   th:classappend="${selectedProductId == null ? 'active' : ''}">
                    <span class="filter-count" th:text="${licenses.size()}">0</span>
                    <span class="filter-label">전체</span>
                </a>
                
                <!-- 제품별 버튼 -->
                <a th:each="entry : ${productStats}"
                   th:href="@{/license/registry/list(productId=${entry.key})}"
                   class="filter-btn"
                   th:classappend="${selectedProductId == entry.key ? 'active' : ''}">
                    <span class="filter-count" th:text="${entry.value}">0</span>
                    <span class="filter-label" th:text="${entry.key}"></span>
                </a>
            </div>
        </div>
        
        <!-- 대장 테이블 -->
        <div class="table-section">
            <div class="table-header">
                <h2>
                    라이선스 목록 
                    <span style="color: #666; font-weight: normal; font-size: 14px;">
                        (총 <strong id="totalCount" th:text="${licenses.size()}">0</strong>건
                        <span id="filteredInfo" style="display:none;"> / 필터링: <strong id="filteredCount">0</strong>건</span>)
                    </span>
                </h2>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button id="sortForeignBtn" class="btn-sort" onclick="toggleForeignSort()" title="한글이 아닌 등록자를 맨 위로 정렬">
                        <i class="fas fa-globe"></i> 외국인 등록자 상단
                    </button>
                    <a th:href="@{/license/registry/download/csv}" class="btn-top">
                        <i class="fas fa-download"></i> CSV 다운로드
                    </a>
                    <a th:if="${hasEditPermission}" th:href="@{/license/registry/upload}" class="btn-top btn-primary">
                        <i class="fas fa-upload"></i> CSV 업로드
                    </a>
                </div>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="licenseTable" th:if="${licenses != null && !licenses.isEmpty()}">
                    <thead>
                        <tr>
                            <th>License ID</th>
                            <th>제품</th>
                            <th>등록자</th>
                            <th>회사</th>
                            <th>이메일</th>
                            <th>발급자</th>
                            <th>발급일</th>
                            <th>만료일</th>
                            <th>상태</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lic : ${licenses}">
                            <td th:title="${lic.licenseId}">
                                <a th:href="@{'/license/registry/detail/' + ${lic.id}}" class="lic-id-link">
                                    <span th:text="${lic.licenseId}"></span>
                                </a>
                            </td>
                            <td th:title="${lic.productId}">
                                <strong th:text="${lic.productId}"></strong>
                            </td>
                            <td th:title="${lic.registeredTo}">
                                <div th:text="${lic.registeredTo}"></div>
                            </td>
                            <td th:title="${lic.company}">
                                <div th:text="${lic.company}"></div>
                            </td>
                            <td th:title="${lic.email}" th:text="${lic.email ?: '-'}"></td>
                            <td th:title="${lic.country}" th:text="${lic.country ?: '-'}"></td>
                            <td th:text="${lic.generationDateTime != null ? #temporals.format(lic.generationDateTime, 'yyyy-MM-dd') : '-'}"></td>
                            <td th:text="${lic.expiryDate != null ? #temporals.format(lic.expiryDate, 'yyyy-MM-dd') : '무제한'}"></td>
                            <td>
                                <span th:if="${lic.expiryDate == null}" class="badge badge-success">무제한</span>
                                <span th:if="${lic.expiryDate != null && !lic.expired}" class="badge badge-success">
                                    정상 (D-<span th:text="${lic.daysRemaining}"></span>)
                                </span>
                                <span th:if="${lic.expiryDate != null && lic.daysRemaining <= 30 && !lic.expired}" 
                                      class="badge badge-warning">
                                    곧 만료 (D-<span th:text="${lic.daysRemaining}"></span>)
                                </span>
                                <span th:if="${lic.expired}" class="badge badge-danger">만료됨</span>
                            </td>
                            <td class="actions">
                                <a th:href="@{'/license/registry/detail/' + ${lic.id}}" 
                                   class="btn btn-primary btn-sm">상세</a>
                                <a th:if="${hasEditPermission}" 
                                   th:href="@{'/license/registry/download/' + ${lic.id}}" 
                                   class="btn btn-success btn-sm">다운로드</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="no-data" th:if="${licenses == null || licenses.isEmpty()}">
                    <div class="empty-ico"><i class="fas fa-clipboard-list"></i></div>
                    <div style="font-size:0.95rem; font-weight:600; color:var(--text2); margin-bottom:6px;">등록된 라이선스가 없습니다</div>
                    <div style="font-size:0.82rem; color:var(--muted); margin-bottom: 18px;">CSV 파일을 업로드하여 대장을 등록하세요.</div>
                    <a th:if="${hasEditPermission}" th:href="@{/license/registry/upload}" class="btn-top btn-primary">
                        <i class="fas fa-upload"></i> CSV 업로드
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 테이블 검색 기능
        function searchTable() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toUpperCase();
            const table = document.getElementById('licenseTable');
            const tr = table.getElementsByTagName('tr');
            
            let visibleCount = 0;
            
            for (let i = 1; i < tr.length; i++) {
                const row = tr[i];
                const cells = row.getElementsByTagName('td');
                let found = false;
                
                // License ID, 제품, 등록자, 회사 컬럼에서 검색
                for (let j = 0; j < 4; j++) {
                    if (cells[j]) {
                        const txtValue = cells[j].textContent || cells[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                
                if (found) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                }
            }
            
            // 필터링 정보 표시
            updateFilterInfo(visibleCount);
        }
        
        // 제품별 필터링
        function filterByProduct() {
            const select = document.getElementById('productFilter');
            const productId = select.value;
            
            if (productId) {
                window.location.href = '/license/registry/list?productId=' + encodeURIComponent(productId);
            } else {
                window.location.href = '/license/registry/list';
            }
        }
        
        // 필터링 정보 업데이트
        function updateFilterInfo(filteredCount) {
            const totalCount = document.querySelectorAll('#licenseTable tbody tr').length;
            const filteredInfo = document.getElementById('filteredInfo');
            const filteredCountSpan = document.getElementById('filteredCount');
            
            if (filteredCount < totalCount) {
                filteredInfo.style.display = 'inline';
                filteredCountSpan.textContent = filteredCount;
            } else {
                filteredInfo.style.display = 'none';
            }
        }
        // 한글 여부 판별
        function isKorean(str) {
            return /[가-힣]/.test(str);
        }

        // 비한글 등록자 상단 정렬
        function applyForeignSort() {
            const table = document.getElementById('licenseTable');
            if (!table) return;
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            const foreign = rows.filter(r => {
                const name = r.cells[2] ? r.cells[2].textContent.trim() : '';
                return name !== '' && !isKorean(name);
            });
            const korean = rows.filter(r => {
                const name = r.cells[2] ? r.cells[2].textContent.trim() : '';
                return name === '' || isKorean(name);
            });
            [...foreign, ...korean].forEach(r => tbody.appendChild(r));
        }

        // 비한글 등록자 상단 정렬 토글
        function toggleForeignSort() {
            const btn = document.getElementById('sortForeignBtn');
            const isActive = sessionStorage.getItem('foreignSortActive') === 'true';

            if (!isActive) {
                sessionStorage.setItem('foreignSortActive', 'true');
                applyForeignSort();
                btn.classList.add('active');
                btn.textContent = '✅ 외국인 등록자 상단';
            } else {
                sessionStorage.setItem('foreignSortActive', 'false');
                location.reload(); // 원래 서버 순서 복원
            }
        }

        // 페이지 로드 시 저장된 정렬 상태 복원
        window.addEventListener('DOMContentLoaded', function () {
            if (sessionStorage.getItem('foreignSortActive') === 'true') {
                applyForeignSort();
                const btn = document.getElementById('sortForeignBtn');
                if (btn) {
                    btn.classList.add('active');
                    btn.textContent = '✅ 외국인 등록자 상단';
                }
            }
        });
    </script>
</body>
</html>
