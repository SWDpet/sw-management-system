# ========================================
# 0. 서버 포트 (Hyper-V 동적 포트 범위 8057-8356 회피)
# ========================================
server.port=${SERVER_PORT:9090}

# ========================================
# i18n (하드코딩 개선 스프린트 #1-B)
# ========================================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.always-use-message-format=false

# 로그인 실패 임계값 (FR-B4 — SecurityLoginProperties)
security.login.max-failed-attempts=${SEC_LOGIN_MAX_FAIL:5}
security.login.lock-time-minutes=${SEC_LOGIN_LOCK_MIN:15}

# 시스템 관계도 C 탭 (ERD 인터랙티브) — .mmd 파일 디렉토리
# 기본: docs (프로젝트 루트 기준 상대 경로). 배포 시 -Dapp.erd.mmd-dir=/opt/.../erd 로 override 가능.
# 미존재 시 classpath:erd/ 로 fallback.
app.erd.mmd-dir=docs

# 시스템 관계도 C 탭 — ERD 테이블/컬럼 한글 설명 YAML (filesystem only)
# 배포 환경에서 경로가 다르면 -Dapp.erd.descriptions-file=/opt/.../erd-descriptions.yml 로 override.
# 파일 미존재/파싱 실패 시 ERD 는 설명 없이 정상 동작.
app.erd.descriptions-file=docs/erd-descriptions.yml

# ========================================
# 1. 데이터베이스 연결 정보
# ========================================
# 환경변수 기반 DB 연결. password 는 하드코딩 기본값 없음 — 미설정 시 의도된 부팅 실패.
# (감사 P1-1 조치: 2026-04-18)
spring.datasource.url=${DB_URL:jdbc:postgresql://211.104.137.55:5881/SW_Dept}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ========================================
# 2. JPA 설정
# ========================================
spring.jpa.hibernate.ddl-auto=none
# [감사 P2 5-1] 운영 기본값 OFF. 로컬 디버깅은
#   cp application-local.properties.example application-local.properties
# 후 -Dspring-boot.run.profiles=local 실행 — SQL 로그는 별도로
# logback-spring.xml 의 org.hibernate.SQL 레벨도 조정해야 실효성 있음.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# 3. UTF-8 한글 설정
# ========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ========================================
# 4. 세션 설정
# ========================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=SWMANAGER_SESSION
server.servlet.session.cookie.http-only=true
# 개발환경: false, 운영환경(HTTPS)에서는 application-prod.properties에서 true로 오버라이드
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.max-age=1800
server.servlet.session.tracking-modes=cookie

# ========================================
# 5. 업로드 용량 설정
# ========================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ========================================
# 6. GeoNURIS 라이선스 발급 설정
# ========================================
# GeoNURIS_License.jar 실제 위치 (서버에 복사 후 경로 수정)
geonuris.license.jar.path=src/main/resources/geonuris/GeoNURIS_License.jar
# Java 실행 경로 (기본: java, JDK 경로 지정 가능)
geonuris.java.path=java

# ========================================
# 7. team-monitor — 가상 팀 진행율 모니터링 웹 대시보드 (sprint team-monitor-dashboard)
# ========================================
# === Actuator (health/info) ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
# InfoContributor 가 단일 진실원이므로 env 자동 노출 OFF
management.info.env.enabled=false

# === Server compression — SSE 보호 (기획서 §4-7) ===
# 기본값 false 이지만 명시적 표기로 회귀 차단.
# WARNING: 아래 mime-types 에 text/event-stream 추가 금지.
#          추가 시 SSE 가 압축되어 EventSource 가 first event 까지 버퍼링 → 실시간성 깨짐.
server.compression.enabled=false
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

# === team-monitor 키 표 (개발계획 §NFR-4-b 1:1) ===
# 운영자 1차 조회 지점. 변경 전 기획서 NFR-4-b 표 확인.
teammonitor.enabled=true
teammonitor.status-dir=.team-workspace/status

# watcher
teammonitor.watcher.mode=auto
teammonitor.watcher.polling-interval-ms=1000
teammonitor.watcher.restart-interval-ms=30000

# SSE
teammonitor.sse.max-emitters=20
teammonitor.sse.overflow-policy=reject
teammonitor.sse.heartbeat-interval-ms=30000
teammonitor.sse.timeout-ms=0
teammonitor.sse.rate-limit-per-min=10

# timeline
teammonitor.timeline.size=20

# security
# CSP — 기존 admin GNB(top-nav.html) 의 inline style/event 핸들러 + fontawesome CDN 호환을 위해 완화.
# 1차 XSS 방어는 Thymeleaf `th:text` auto-escape + JS `textContent` (innerHTML 금지). 본 CSP 는 2차 defense-in-depth.
# inline 미사용으로 리팩터 시 'unsafe-inline' 제거 권장.
teammonitor.security.csp=default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'
teammonitor.security.allowed-origins=

