<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>점검 자동화 QR 뷰어 — 갤럭시탭 스캔 테스트</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px 32px;
    font-family: "Pretendard", "Segoe UI", sans-serif;
    background: #f5f5f5; color: #111;
  }
  h1 { margin: 0 0 8px; font-size: 22px; }
  .meta { color: #555; font-size: 14px; margin-bottom: 24px; }
  .meta b { color: #111; }
  .qrs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 24px;
  }
  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .card .label {
    font-size: 14px; color: #777; margin-bottom: 4px;
  }
  .card .seq {
    font-size: 32px; font-weight: 700; margin-bottom: 12px;
  }
  .card .seq .kind { font-size: 14px; color: #2563eb; }
  .card img {
    width: 100%; max-width: 480px; height: auto;
    image-rendering: pixelated;
  }
  .card .info {
    margin-top: 12px; font-size: 12px; color: #555;
  }
  footer {
    margin-top: 32px; padding-top: 16px;
    border-top: 1px solid #ddd; color: #777; font-size: 13px;
  }
  .badge {
    display: inline-block; padding: 2px 8px;
    background: #2563eb; color: #fff; border-radius: 4px;
    font-size: 11px; margin-left: 6px;
  }
  .badge.warn { background: #ea580c; }
</style>
</head>
<body>
<h1>UPIS 점검 자동화 — QR 반출 화면</h1>
<div class="meta">
  payload id <b id="m-id">—</b> ·
  raw <b id="m-raw">—</b> B → gzip <b id="m-gz">—</b> B → base45 <b id="m-b45">—</b> chars ·
  hash <b id="m-hash">—</b> ·
  총 <b id="m-total">—</b> 프레임 (헤더 1 + 데이터 <b id="m-data">—</b>)
</div>

<div class="qrs" id="qrs"></div>

<footer>
  스캔 순서: 헤더(seq=0) → 데이터(seq=1..N). PWA는 순서 무관 수신 가능. <br />
  ※ 모니터 글레어 시 화면 밝기 ↑, 카메라 거리 30~50cm 권장.
</footer>

<script>
(async function () {
  const res = await fetch("out/manifest.json", { cache: "no-store" });
  if (!res.ok) {
    document.body.innerHTML += "<p style='color:red'>manifest.json 로드 실패. encode.py 먼저 실행하세요.</p>";
    return;
  }
  const m = await res.json();
  const h = m.header;
  document.getElementById("m-id").textContent = h.id;
  document.getElementById("m-raw").textContent = h.raw_bytes;
  document.getElementById("m-gz").textContent = h.gz_bytes;
  document.getElementById("m-b45").textContent = h.b45_chars;
  document.getElementById("m-hash").textContent = h.hash;
  document.getElementById("m-total").textContent = m.frames.length;
  document.getElementById("m-data").textContent = m.frames.length - 1;

  const container = document.getElementById("qrs");
  for (const f of m.frames) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="label">${f.kind === "header" ? "메타 / 헤더" : "데이터 청크"}</div>
      <div class="seq">${f.seq} <span class="kind">/ ${h.total}</span>
        <span class="badge ${f.kind==='header'?'':'warn'}">${f.kind.toUpperCase()}</span>
      </div>
      <img src="out/${f.filename}" alt="QR ${f.seq}" />
      <div class="info">QR Ver ${f.qr_version} · ${f.chars} chars · ${f.png_bytes} B PNG</div>
    `;
    container.appendChild(card);
  }
})();
</script>
</body>
</html>
